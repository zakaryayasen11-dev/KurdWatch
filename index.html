async function loadRoomChat(rId){
  if(roomSub){try{sb.removeChannel(roomSub)}catch(e){}roomSub=null}
  roomChats=[];
  const{data:msgs}=await sb.from('room_chats').select('id,room_id,user_id,message,created_at').eq('room_id',rId).order('created_at',{ascending:true}).limit(100);
  const uids=[...new Set((msgs||[]).map(m=>m.user_id).filter(Boolean))];
  let umap={};
  if(uids.length){const{data:ps}=await sb.from('profiles').select('id,username').in('id',uids);if(ps)ps.forEach(p=>{umap[p.id]=p.username})}
  roomChats=(msgs||[]).map(m=>({...m,pname:umap[m.user_id]||'User'}));
  renderChats();
  roomSub=sb.channel(`rc_${rId}_${Date.now()}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'room_chats',filter:`room_id=eq.${rId}`},async payload=>{
      if(payload.new.user_id!==user?.id){
        const{data:up}=await sb.from('profiles').select('username').eq('id',payload.new.user_id).single();
        const un=up?.username||'User';
        addNotif('msg',`💬 ${un}: ${payload.new.message?.substring(0,38)}`,'');
        if(!roomChats.find(c=>c.id===payload.new.id)){roomChats.push({...payload.new,pname:un});renderChats()}
      }
    }).subscribe();
}

function renderChats(){
  const box=document.getElementById('chatMsgs');if(!box)return;
  if(!roomChats.length){box.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--text3);font-size:0.8rem">${t('noMsg')}</div>`;return}
  const atBot=box.scrollHeight-box.scrollTop-box.clientHeight<80;
  box.innerHTML=roomChats.map(msg=>{
    const own=msg.user_id===user?.id;
    if(msg._type==='poll')return renderPollMsg(msg,own);
    if(msg._type==='gif')return renderGifMsg(msg,own);
    let txt=(msg.message||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    txt=txt.replace(/@(\w+)/g,'<span class="mention">@$1</span>');
    const reacts=reactions[msg.id]||{};
    const reactHtml=Object.entries(reacts).length?`<div class="creact-wrap">${Object.entries(reacts).map(([e,users])=>`<div class="creact ${users.includes(user?.id)?'mine':''}" onclick="toggleReact('${msg.id}','${e}')" title="${users.length}">${e} ${users.length}</div>`).join('')}</div>`:'';
    return`<div class="cmsg ${own?'own':'other'}" id="msg_${msg.id}">
      ${!own?`<div class="cname">${msg.pname}${isOwner()&&!own?` <button class="modbtn" onclick="kickMem('${msg.user_id}','${msg.pname}')">✕ ${t('kick')}</button>`:''}</div>`:''}
      <div class="cbubble">${txt}</div>
      ${reactHtml}
      <div style="display:flex;gap:6px;margin-top:3px">
        <span class="cthread" onclick="openThread('${msg.id}','${(msg.message||'').replace(/'/g,"\\'")}')"><i class="fas fa-reply" style="font-size:10px"></i> Thread</span>
        <span class="cthread" onclick="addQuickReact('${msg.id}')"><i class="fas fa-smile" style="font-size:10px"></i></span>
      </div>
    </div>`;
  }).join('');
  if(atBot)box.scrollTop=box.scrollHeight;
}

function renderPollMsg(msg,own){
  const poll=msg._pollData||{};
  const total=Object.values(poll.votes||{}).reduce((a,v)=>a+(v||0),0);
  const voted=poll.voted;
  return`<div class="cmsg ${own?'own':'other'}">
    ${!own?`<div class="cname">${msg.pname}</div>`:''}
    <div class="chat-poll" style="max-width:100%">
      <div class="poll-q">📊 ${poll.question||''}</div>
      ${(poll.options||[]).map((opt,i)=>{
        const pct=total>0?Math.round(((poll.votes?.[i]||0)/total)*100):0;
        return`<div class="poll-opt ${voted===i?'voted':''}" onclick="votePoll('${msg.id}',${i})">
          <div class="poll-bar" style="width:${voted!==undefined?pct:0}%"></div>
          <div class="poll-txt"><span>${opt}</span>${voted!==undefined?`<span class="poll-pct">${pct}%</span>`:''}</div>
        </div>`;
      }).join('')}
      <div style="font-size:0.65rem;color:var(--text3);margin-top:6px">${total} دەنگ</div>
    </div>
  </div>`;
}

function renderGifMsg(msg,own){
  return`<div class="cmsg ${own?'own':'other'}">
    ${!own?`<div class="cname">${msg.pname}</div>`:''}
    <img class="gif-img" src="${msg._gifUrl||''}" alt="gif" loading="lazy">
  </div>`;
}

function toggleReact(msgId,emoji){
  if(!reactions[msgId])reactions[msgId]={};
  const users=reactions[msgId][emoji]||[];
  if(users.includes(user.id)){reactions[msgId][emoji]=users.filter(u=>u!==user.id)}
  else{reactions[msgId][emoji]=[...users,user.id]}
  if(!reactions[msgId][emoji].length)delete reactions[msgId][emoji];
  renderChats();
}

const QUICK_EMOJIS=['👍','❤️','😂','🔥','😮','😢'];
function addQuickReact(msgId){
  const existing=document.getElementById(`qr_${msgId}`);
  if(existing){existing.remove();return}
  const el=document.getElementById(`msg_${msgId}`);if(!el)return;
  const picker=document.createElement('div');
  picker.id=`qr_${msgId}`;
  picker.style.cssText='display:flex;gap:5px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:2rem;position:absolute;z-index:100;box-shadow:var(--shadow);animation:dropIn 0.18s ease';
  picker.innerHTML=QUICK_EMOJIS.map(e=>`<button onclick="toggleReact('${msgId}','${e}');document.getElementById('qr_${msgId}')?.remove()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;padding:2px;border-radius:6px;transition:var(--tr)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='none'">${e}</button>`).join('');
  el.style.position='relative';el.appendChild(picker);
  setTimeout(()=>picker.remove(),5000);
}

async function sendChat(){
  const inp=document.getElementById('chatInput');const msg=inp.value.trim();
  if(!msg||!roomId)return;
  inp.value='';inp.focus();
  const tmp={id:'tmp_'+Date.now(),room_id:roomId,user_id:user.id,message:msg,pname:user.profile?.username||'You',created_at:new Date().toISOString()};
  roomChats.push(tmp);renderChats();
  const{data,error}=await sb.from('room_chats').insert({room_id:roomId,user_id:user.id,message:msg}).select().single();
  if(error){roomChats=roomChats.filter(c=>c.id!==tmp.id);renderChats();inp.value=msg;toast(t('msgFail'),'err')}
  else{
    const i=roomChats.findIndex(c=>c.id===tmp.id);
    if(i>=0){roomChats[i]={...data,pname:tmp.pname};renderChats()}
    addXP(2,'💬');logAct('chat',`${user.profile?.username}: ${msg.substring(0,30)}`);
  }
}
function addEmoji(e){const i=document.getElementById('chatInput');if(i){i.value+=e;i.focus()}}

// ── THREAD ──
let threadMsgData=null;
function openThread(msgId,msgText){
  threadMsgId=msgId;
  const panel=document.getElementById('threadPanel');
  panel.classList.add('open');
  const msgs=document.getElementById('threadMsgs');
  if(msgs)msgs.innerHTML=`<div style="padding:10px;background:var(--bg3);border-radius:12px;font-size:0.8rem;border:1px solid var(--border);margin-bottom:12px"><div style="font-size:0.65rem;color:var(--text3);margin-bottom:3px">Original</div>${msgText}</div>`;
}
function closeThread(){document.getElementById('threadPanel').classList.remove('open');threadMsgId=null}
function sendThreadMsg(){
  const inp=document.getElementById('threadInput');const msg=inp.value.trim();if(!msg||!threadMsgId)return;
  const msgs=document.getElementById('threadMsgs');
  if(msgs){
    const d=document.createElement('div');
    d.className='cmsg own';d.innerHTML=`<div class="cbubble">${msg}</div>`;
    msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
  }
  inp.value='';addXP(1,'💬');
}

// ── POLL ──
function openPollModal(){document.getElementById('pollModal').classList.add('open')}
function closePollModal(){document.getElementById('pollModal').classList.remove('open')}
function sendPoll(){
  const q=document.getElementById('pollQ').value.trim();
  const o1=document.getElementById('pollO1').value.trim();
  const o2=document.getElementById('pollO2').value.trim();
  const o3=document.getElementById('pollO3').value.trim();
  if(!q||!o1||!o2){toast(t('fillAll'),'err');return}
  const pollId='poll_'+Date.now();
  const pollData={question:q,options:[o1,o2,...(o3?[o3]:[])],votes:{},total:0};
  polls[pollId]=pollData;
  const tmp={id:pollId,room_id:roomId,user_id:user.id,message:'[poll]',pname:user.profile?.username||'You',created_at:new Date().toISOString(),_type:'poll',_pollData:{...pollData}};
  roomChats.push(tmp);renderChats();
  closePollModal();
  document.getElementById('pollQ').value='';document.getElementById('pollO1').value='';document.getElementById('pollO2').value='';document.getElementById('pollO3').value='';
}
function votePoll(pollId,optIdx){
  const msg=roomChats.find(m=>m.id===pollId);if(!msg)return;
  const pd=msg._pollData;if(pd.voted!==undefined)return;
  pd.voted=optIdx;
  if(!pd.votes)pd.votes={};
  pd.votes[optIdx]=(pd.votes[optIdx]||0)+1;
  renderChats();addXP(3,'📊');
}

// ── GIF ──
const GIFS_MOCK=['https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif','https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif','https://media.giphy.com/media/l0HlvtIPzPdt2usKs/giphy.gif','https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif','https://media.giphy.com/media/3oKIPnAiaMCws8nOsE/giphy.gif','https://media.giphy.com/media/l0IylOPCNkiqOgMyA/giphy.gif'];
function openGifPicker(){document.getElementById('gifModal').classList.add('open');renderGifGrid(GIFS_MOCK)}
function closeGifModal(){document.getElementById('gifModal').classList.remove('open')}
function searchGifs(q){
  // In production: use Giphy API
  const filtered=GIFS_MOCK.filter((_,i)=>i<(q.length>0?3:6));
  renderGifGrid(filtered);
}
function renderGifGrid(gifs){
  const g=document.getElementById('gifGrid');
  if(!g)return;
  g.innerHTML=gifs.map(url=>`<img src="${url}" style="width:100%;border-radius:8px;cursor:pointer;transition:transform 0.2s" onclick="sendGif('${url}')" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" loading="lazy">`).join('');
}
function sendGif(url){
  const tmp={id:'gif_'+Date.now(),room_id:roomId,user_id:user.id,message:'[gif]',pname:user.profile?.username||'You',created_at:new Date().toISOString(),_type:'gif',_gifUrl:url};
  roomChats.push(tmp);renderChats();
  closeGifModal();addXP(1,'🎬');
}

// ── KICK ──
async function kickMem(uid,uname){
  if(!roomId||!isOwner())return;
  if(!confirm(`${t('kick')} ${uname}?`))return;
  await sb.from('room_members').delete().eq('room_id',roomId).eq('user_id',uid);
  toast(`${uname} دەرکرا`);loadRoomMembers(roomId);logAct('kick',`kicked ${uname}`);
}

// ─────────────────────────────────────────────
async function renderAdmin(){
  document.getElementById('pageContent').innerHTML=`
    <div class="ph"><div class="ph-left"><div class="ph-icon">⚙️</div><div><div class="ph-title">${t('admin')}</div></div></div></div>
    <div class="atabs">
      <button class="atab ${adminSec==='stats'?'active':''}" onclick="setAdminSec('stats')">📊 ${t('stats')}</button>
      <button class="atab ${adminSec==='channels'?'active':''}" onclick="setAdminSec('channels')">📺 ${t('channels')}</button>
      <button class="atab ${adminSec==='categories'?'active':''}" onclick="setAdminSec('categories')">🏷 ${t('catManage')}</button>
      ${isOwner()?`<button class="atab ${adminSec==='users'?'active':''}" onclick="setAdminSec('users')">👥 بەکارهێنەران</button>`:''}
      ${isOwner()?`<button class="atab ${adminSec==='log'?'active':''}" onclick="setAdminSec('log')">📋 ${t('activityLog')}</button>`:''}
    </div>
    <div id="adminContent"></div>`;
  await renderAdminSec();
}
function setAdminSec(s){adminSec=s;document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderAdminSec()}
async function renderAdminSec(){
  const c=document.getElementById('adminContent');if(!c)return;
  if(adminSec==='stats')await renderStats(c);
  else if(adminSec==='channels')await renderAdminChs(c);
  else if(adminSec==='categories')renderCatMgr(c);
  else if(adminSec==='users')await renderAdminUsers(c);
  else if(adminSec==='log')renderLog(c);
}

async function renderStats(c){
  const[{count:uc},{count:cc},{count:rc}]=await Promise.all([
    sb.from('profiles').select('*',{count:'exact',head:true}),
    sb.from('channels').select('*',{count:'exact',head:true}),
    sb.from('rooms').select('*',{count:'exact',head:true}),
  ]);
  c.innerHTML=`
    <div class="sgrid">
      <div class="scard"><div class="sico">👥</div><div class="sval" style="color:var(--blue)">${uc||0}</div><div class="slbl">${t('totalUsers')}</div></div>
      <div class="scard"><div class="sico">📺</div><div class="sval" style="color:var(--red)">${cc||0}</div><div class="slbl">${t('totalChannels')}</div></div>
      <div class="scard"><div class="sico">🏠</div><div class="sval" style="color:var(--green)">${rc||0}</div><div class="slbl">${t('totalRooms')}</div></div>
      <div class="scard"><div class="sico">🟢</div><div class="sval" style="color:var(--yellow)">${Math.floor(Math.random()*50)+10}</div><div class="slbl">${t('onlineNow')}</div></div>
    </div>
    <div class="acard"><div class="acard-t"><i class="fas fa-chart-bar"></i> باشترین کەناڵەکان</div><div id="topChs"><div class="loading"><div class="spinner"></div></div></div></div>`;
  const{data:top}=await sb.from('channels').select('name,category,views').order('views',{ascending:false}).limit(8);
  const tc=document.getElementById('topChs');
  if(tc)tc.innerHTML=(top||[]).map((ch,i)=>`
    <div class="litem" style="cursor:default">
      <div><div class="li-n">${i+1}. ${ch.name}</div><div class="li-s">${catLabel(ch.category)}</div></div>
      <span style="font-size:0.77rem;color:var(--text3)"><i class="fas fa-eye"></i> ${ch.views||0}</span>
    </div>`).join('')||'<p style="font-size:0.8rem;color:var(--text3)">-</p>';
}

async function renderAdminChs(c){
  c.innerHTML=`
    <div class="agrid">
      <div class="acard"><div class="acard-t"><i class="fas fa-plus"></i> کەناڵی نوێ</div>
        <div class="aform">
          <input id="cName" placeholder="ناوی کەناڵ">
          <input id="cImg" placeholder="لینکی وێنە (ئارەزوومەند)">
          <select id="cCat">${cats.map(cat=>`<option value="${cat}">${catLabel(cat)}</option>`).join('')}</select>
          <input id="cUrl" placeholder="لینکی پەخش (.m3u8 یان iframe)">
          <button class="btn-add" onclick="addCh()">+ زیادکردن</button>
        </div>
      </div>
      <div class="acard"><div class="acard-t"><i class="fas fa-list"></i> کەناڵەکان</div><div id="adminChs"><div class="loading"><div class="spinner"></div></div></div></div>
    </div>`;
  await loadAdminChs();
}

async function loadAdminChs(){
  const{data}=await sb.from('channels').select('*').order('name');
  const c=document.getElementById('adminChs');if(!c)return;
  if(!data?.length){c.innerHTML=`<p style="font-size:0.8rem;color:var(--text3)">${t('noChannels')}</p>`;return}
  c.innerHTML=data.map(ch=>`
    <div class="litem">
      <div><div class="li-n">${ch.name}</div><div class="li-s">${catLabel(ch.category)} · ${ch.views||0} views</div></div>
      <button class="btn-del" onclick="delCh(${ch.id})"><i class="fas fa-trash"></i></button>
    </div>`).join('');
}

function renderCatMgr(c){
  c.innerHTML=`
    <div class="acard" style="max-width:520px">
      <div class="acard-t"><i class="fas fa-tags"></i> ${t('catManage')}</div>
      <div class="ctags">${cats.map(cat=>`<div class="ctag"><span>${catLabel(cat)}</span><button class="ctag-del" onclick="deleteCat('${cat}')">✕</button></div>`).join('')}</div>
      <div class="cat-add">
        <input class="cat-inp" id="newCatInp" placeholder="${t('catName')} (بە ئینگلیزی)" onkeydown="if(event.key==='Enter')addCat()">
        <button class="cat-addbtn" onclick="addCat()"><i class="fas fa-plus"></i></button>
      </div>
      <p style="font-size:0.68rem;color:var(--text3);margin-top:10px">* کلیلەکەی کاتێگۆری پێویستە بە ئینگلیزی بێت</p>
    </div>`;
}
function addCat(){
  const inp=document.getElementById('newCatInp');const v=inp.value.trim().toLowerCase().replace(/\s+/g,'_');
  if(!v)return;if(cats.includes(v)){toast(t('catExists'),'err');return}
  cats.push(v);localStorage.setItem('kw_cats',JSON.stringify(cats));inp.value='';toast(t('catAdded'));
  renderCatMgr(document.getElementById('adminContent'));cache.all();
}
function deleteCat(c){
  if(!confirm(t('catManage')+' سڕینەوە؟'))return;
  cats=cats.filter(x=>x!==c);localStorage.setItem('kw_cats',JSON.stringify(cats));
  toast(t('catDeleted'));renderCatMgr(document.getElementById('adminContent'));cache.all();
}

async function renderAdminUsers(c){
  c.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const{data}=await sb.from('profiles').select('*').order('created_at');
  c.innerHTML=`<div class="acard"><div class="acard-t"><i class="fas fa-users"></i> هەموو بەکارهێنەران</div>
    ${(data||[]).map(u2=>`
      <div class="litem">
        <div><div class="li-n">${u2.username||u2.email}</div><div class="li-s">${u2.role} · ${(u2.permissions||[]).join(',')||'-'}</div></div>
        <div style="display:flex;gap:4px">
          <button class="btn-edit" onclick="openPermModal('${u2.id}','${u2.username||u2.email}')"><i class="fas fa-edit"></i></button>
          ${u2.id!==user?.id?`<button class="btn-del" onclick="delUser('${u2.id}')"><i class="fas fa-trash"></i></button>`:''}
        </div>
      </div>`).join('')}
  </div>`;
}

function renderLog(c){
  c.innerHTML=`<div class="acard"><div class="acard-t"><i class="fas fa-list-alt"></i> ${t('activityLog')}</div>
    ${actLog.length?`<table class="log-table">
      <thead><tr><th>چالاکی</th><th>وردەکاری</th><th>کات</th></tr></thead>
      <tbody>${actLog.map(l=>`<tr><td><span class="lbadge ${l.type}">${l.type}</span></td><td>${l.text}</td><td style="white-space:nowrap;font-size:0.68rem">${timeAgo(l.time)}</td></tr>`).join('')}</tbody>
    </table>`:`<div class="empty" style="padding:1.5rem"><i class="fas fa-clipboard"></i><h3>هیچ چالاکییەک نیە</h3></div>`}
  </div>`;
}

async function addCh(){
  const n=document.getElementById('cName').value.trim(),img=document.getElementById('cImg').value.trim(),cat=document.getElementById('cCat').value,url=document.getElementById('cUrl').value.trim();
  if(!n||!url){toast(t('nameRequired'),'err');return}
  await sb.from('channels').insert({name:n,image:img||null,category:cat,live_url:url,views:0});
  toast(t('channelAdded'));
  document.getElementById('cName').value='';document.getElementById('cImg').value='';document.getElementById('cUrl').value='';
  cache.clear(`chs_all_`);cache.clear(`chs_${cat}_`);await loadAdminChs();
  logAct('join',`کەناڵ زیادکرا: ${n}`);
}
async function delCh(id){
  if(!confirm(t('deleteChannel')))return;
  await sb.from('rooms').update({channel_id:null,channel_name:''}).eq('channel_id',id);
  const{error}=await sb.from('channels').delete().eq('id',id);
  if(error){toast(error.message,'err');return}
  toast(t('channelDeleted'));cache.all();await loadAdminChs();logAct('del',`Ch:${id}`);
}
async function delUser(id){
  if(!confirm(t('deleteUser')))return;
  await sb.from('profiles').delete().eq('id',id);
  toast(t('userDeleted'));logAct('del',`User:${id}`);
  renderAdminUsers(document.getElementById('adminContent'));
}

const PERMS=[
  {key:'manage_channels',lbl:{ckb:'بەڕێوەبردنی کەناڵ',en:'Manage Channels'}},
  {key:'manage_rooms',lbl:{ckb:'بەڕێوەبردنی ژوور',en:'Manage Rooms'}},
  {key:'manage_users',lbl:{ckb:'بەڕێوەبردنی بەکارهێنەران',en:'Manage Users'}},
  {key:'all',lbl:{ckb:'هەموو مافەکان',en:'All Permissions'}},
];
async function openPermModal(id,name){
  permUid=id;
  const{data:u2}=await sb.from('profiles').select('permissions').eq('id',id).single();
  const ps=u2?.permissions||[];
  permData={};PERMS.forEach(p=>permData[p.key]=ps.includes(p.key));
  document.getElementById('permTitle').textContent='مافەکانی '+name;
  document.getElementById('permBody').innerHTML=PERMS.map(p=>`
    <div class="perm-item">
      <span style="font-size:0.82rem">${p.lbl[lang]||p.lbl.ckb}</span>
      <div class="toggle ${permData[p.key]?'on':''}" onclick="togglePerm('${p.key}')"></div>
    </div>`).join('');
  document.getElementById('permModal').classList.add('open');
}
function togglePerm(k){
  permData[k]=!permData[k];
  document.querySelector(`#permModal .toggle[onclick="togglePerm('${k}')"]`)?.classList.toggle('on',permData[k]);
}
async function savePerms(){
  const ps=Object.entries(permData).filter(([,v])=>v).map(([k])=>k);
  await sb.from('profiles').update({permissions:ps}).eq('id',permUid);
  closePermModal();toast(t('permsSaved'));
  renderAdminUsers(document.getElementById('adminContent'));
}
function closePermModal(){document.getElementById('permModal').classList.remove('open')}

function logAct(type,text){actLog.unshift({type,text,time:new Date().toISOString()});if(actLog.length>100)actLog=actLog.slice(0,100)}

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
