<html lang="ckb" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --bg2:#11111a;
  --bg3:#1a1a2a;
  --card:#1a1a2e;
  --border:#ffffff15;
  --red:#e63946;
  --red-glow:rgba(230,57,70,0.25);
  --text:#ffffff;
  --text2:#a0a0c0;
  --text3:#606080;
  --green:#10b981;
  --yellow:#f59e0b;
  --gradient:linear-gradient(135deg, #e63946, #c1121f);
}
body.light{
  --bg:#f0f2f8;
  --bg2:#ffffff;
  --bg3:#f5f7fb;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#475569;
  --text3:#94a3b8;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;transition:all 0.3s}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-icon{width:36px;height:36px;background:var(--gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 15px var(--red-glow)}
.logo-text{font-size:1.15rem;font-weight:800;color:var(--text)}
.logo-text span{color:var(--red)}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-icon{width:38px;height:38px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.btn-icon:hover{background:var(--red);color:white}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);padding:6px 14px;border-radius:2rem;cursor:pointer}
.user-badge:hover{border-color:var(--red);background:var(--red-glow)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
.auth-page{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-box{width:100%;max-width:450px;background:var(--bg2);border:1px solid var(--border);border-radius:28px;padding:2rem}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .logo-icon{width:60px;height:60px;font-size:30px;margin:0 auto 12px}
.auth-logo h2{font-size:1.5rem;font-weight:800}
.auth-logo p{font-size:0.8rem;color:var(--text3)}
.auth-tabs{display:flex;background:var(--bg3);border-radius:16px;padding:5px;margin-bottom:2rem}
.auth-tab{flex:1;padding:10px;border:none;background:none;color:var(--text2);font-size:0.85rem;font-weight:600;border-radius:12px;cursor:pointer}
.auth-tab.active{background:var(--gradient);color:white}
.form-group{margin-bottom:1.2rem}
.form-label{display:block;font-size:0.75rem;font-weight:700;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;background:var(--bg3);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:0.9rem;outline:none}
.form-input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.btn-primary{width:100%;padding:12px;background:var(--gradient);border:none;border-radius:14px;color:white;font-size:0.9rem;font-weight:700;cursor:pointer}
.alert{padding:12px;border-radius:14px;font-size:0.8rem;margin-bottom:1.2rem;display:none}
.alert.show{display:block}
.alert-error{background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:#ff8590}
.alert-success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.app-layout{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-left:1px solid var(--border);padding:1.2rem 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.sidebar-section{padding:0 0.8rem;margin-bottom:1.5rem}
.sidebar-label{font-size:0.65rem;font-weight:700;color:var(--text3);padding:0 0.8rem;margin-bottom:0.8rem}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;color:var(--text2);font-size:0.85rem;font-weight:500;width:100%;text-align:right;background:none;border:none}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--red-glow);color:var(--red)}
.content{flex:1;padding:1.5rem;overflow-x:hidden}
.filters-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-chip{padding:6px 16px;border-radius:2rem;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:0.8rem;cursor:pointer}
.filter-chip.active,.filter-chip:hover{background:var(--red);color:white}
.search-wrap{margin-right:auto;position:relative}
.search-input{background:var(--bg2);border:1px solid var(--border);border-radius:2rem;padding:6px 14px 6px 38px;width:200px;color:var(--text);outline:none}
.search-input:focus{width:240px;border-color:var(--red)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3)}
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
.channel-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:all 0.3s}
.channel-card:hover{transform:translateY(-5px);border-color:var(--red)}
.channel-thumb{position:relative;height:150px;overflow:hidden}
.channel-thumb img{width:100%;height:100%;object-fit:cover}
.live-pill{position:absolute;top:10px;right:10px;background:var(--red);color:white;padding:3px 8px;border-radius:2rem;font-size:0.65rem;display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:white;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.channel-body{padding:12px}
.channel-name{font-size:0.95rem;font-weight:700;margin-bottom:4px}
.channel-meta{display:flex;justify-content:space-between}
.channel-cat{font-size:0.7rem;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:2rem}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.2rem;cursor:pointer;transition:all 0.3s}
.room-card:hover{transform:translateY(-3px);border-color:var(--red)}
.room-card.private{border-right:3px solid var(--yellow)}
.room-card.public{border-right:3px solid var(--green)}
.room-name{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.room-badge{font-size:0.65rem;padding:2px 8px;border-radius:2rem}
.room-badge.private{background:rgba(245,158,11,0.15);color:var(--yellow)}
.room-badge.public{background:rgba(16,185,129,0.15);color:var(--green)}
.room-desc{font-size:0.78rem;color:var(--text3);margin-bottom:10px}
.room-footer{display:flex;align-items:center;justify-content:space-between;font-size:0.7rem;flex-wrap:wrap}
.room-members{display:flex;align-items:center;gap:4px;color:var(--text3)}
.room-owner-badge{background:var(--red-glow);color:var(--red);padding:2px 8px;border-radius:2rem;font-size:0.65rem}
.room-members-list{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.room-members-title{font-size:0.65rem;color:var(--text3);margin-bottom:5px}
.room-members-tags{display:flex;flex-wrap:wrap;gap:4px}
.room-member-tag{font-size:0.65rem;background:var(--bg3);padding:2px 8px;border-radius:2rem}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap}
.page-title{font-size:1.2rem;font-weight:800}
.btn-create{display:flex;align-items:center;gap:6px;background:var(--red);border:none;color:white;padding:8px 18px;border-radius:12px;font-size:0.8rem;font-weight:600;cursor:pointer}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:3000;justify-content:center;align-items:center;padding:1rem;backdrop-filter:blur(8px)}
.modal-overlay.open{display:flex}
.stream-modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:960px;overflow:hidden}
.room-modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:1100px;height:85vh;display:flex;flex-direction:column;overflow:hidden}
.room-modal-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.room-modal-body{flex:1;display:flex;overflow:hidden}
.room-video-side{flex:1;border-left:1px solid var(--border)}
.room-chat-side{width:330px;display:flex;flex-direction:column}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;background:#000}
.video-wrap video,.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px}
.chat-message{display:flex;flex-direction:column;margin-bottom:5px}
.chat-message.own{align-items:flex-end}
.chat-message.other{align-items:flex-start}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:0.82rem;background:var(--bg3)}
.chat-message.own .chat-bubble{background:var(--red-glow);color:var(--red)}
.chat-name{font-size:0.65rem;color:var(--text3);margin-bottom:4px}
.chat-input-bar{padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:2rem;padding:10px 16px;color:var(--text);font-size:0.85rem;outline:none}
.chat-input:focus{border-color:var(--red)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--red);border:none;color:white;cursor:pointer}
.create-modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:1.5rem;max-width:480px;width:100%}
.radio-group{display:flex;gap:10px;margin-bottom:1rem}
.radio-opt{flex:1;padding:14px;border:2px solid var(--border);border-radius:14px;text-align:center;cursor:pointer}
.radio-opt.selected{border-color:var(--red);background:var(--red-glow)}
.modal-footer{display:flex;gap:10px;margin-top:1.2rem}
.btn-cancel{flex:1;padding:10px;border:1px solid var(--border);border-radius:12px;background:none;color:var(--text2);cursor:pointer}
.btn-confirm{flex:2;padding:10px;background:var(--red);border:none;border-radius:12px;color:white;cursor:pointer}
.btn-leave-room{background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:var(--red);padding:6px 14px;border-radius:2rem;font-size:0.7rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-leave-room:hover{background:var(--red);color:white}
.close-btn{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.close-btn:hover{background:var(--red);color:white}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
@media(max-width:768px){.admin-grid{grid-template-columns:1fr}}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.2rem}
.admin-card-title{font-size:0.8rem;font-weight:700;color:var(--text2);margin-bottom:1rem}
.admin-form input,.admin-form select{width:100%;padding:10px 12px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text)}
.btn-add{width:100%;padding:10px;background:var(--red);border:none;border-radius:12px;color:white;cursor:pointer}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.list-item-name{font-size:0.8rem;font-weight:600}
.list-item-sub{font-size:0.7rem;color:var(--text3)}
.btn-del,.btn-edit{width:32px;height:32px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);color:var(--red)}
.btn-del:hover{background:var(--red);color:white}
.btn-edit{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue);margin-left:5px}
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.toggle{width:40px;height:22px;background:var(--bg);border-radius:11px;position:relative;cursor:pointer;border:1px solid var(--border)}
.toggle.on{background:var(--red)}
.toggle::after{content:'';position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:white;transition:transform 0.2s}
.toggle.on::after{transform:translateX(-18px)}
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state i{font-size:4rem;margin-bottom:1rem;opacity:0.3}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:8px;min-width:200px;z-index:2000;display:none}
.dropdown.open{display:block}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;color:var(--text2);font-size:0.8rem;cursor:pointer;width:100%;text-align:right;background:none;border:none}
.dropdown-item:hover{background:var(--bg3);color:var(--text)}
.dropdown-item.danger{color:#ff8590}
.header-right{position:relative}
.password-info{font-size:0.7rem;color:var(--text3);margin-top:8px;padding:8px;background:var(--bg3);border-radius:10px}
@media(max-width:768px){.sidebar{display:none}.room-chat-side{width:100%;height:250px}.room-modal-body{flex-direction:column}}
</style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="navigate('home')">
    <div class="logo-icon">📺</div>
    <span class="logo-text">KURD<span>WATCH</span></span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="header-right" id="headerRight"></div>
  </div>
</header>

<div class="toast-container" id="toastContainer"></div>
<main id="main"></main>

<div class="modal-overlay" id="streamModal">
  <div class="stream-modal">
    <div class="stream-header" style="padding:1rem 1.2rem;display:flex;justify-content:space-between;border-bottom:1px solid var(--border)">
      <span id="streamTitle" style="font-weight:700"></span>
      <button class="close-btn" onclick="closeStream()">✕</button>

    <div class="video-wrap" id="videoWrap"></div>
  </div>
</div>

<div class="modal-overlay" id="createRoomModal">

<div class="modal-overlay" id="joinRoomModal">

</div>

<div class="modal-overlay" id="permModal">

    <div id="permModalBody"></div>

  </div>
</div>

<div class="modal-overlay" id="roomModal">

    <div class="room-modal-header">
      <div><span id="roomModalTitle" style="font-weight:700"></span><span id="roomMemberCount" style="font-size:0.7rem;margin-right:10px;background:var(--bg3);padding:2px 8px;border-radius:2rem"></span></div>

  </div>

<script>
const SUPABASE_URL = 'https://lgxcilaegtkjepbqjaql.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneGNpbGFlZ3RramVwYnFqYXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDM0MDksImV4cCI6MjA5NjY3OTQwOX0.KmY35K60CInUvI96_lq6FzzyJiYuBSduPU3XVmDQ3og';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, currentPage = 'home', filterCat = 'all', searchQ = '', channelPage = 1;
let currentStreamChannel = null, streamHls = null, roomHls = null, currentRoomId = null, pendingJoinRoomId = null;
let permUserId = null, permData = {}, selectedRoomType = 'public', darkMode = true;
let roomChats = [], roomSub = null, roomMembers = [];
let loginAttempts = {};

const PASS_RULES = [
  { id: 'len', label: 'لانی کەم ٨ پیت', test: (p) => p.length >= 8 },
  { id: 'upper', label: 'پیتی گەورە (A-Z)', test: (p) => /[A-Z]/.test(p) },
  { id: 'lower', label: 'پیتی بچووک (a-z)', test: (p) => /[a-z]/.test(p) },
  { id: 'num', label: 'ژمارە (0-9)', test: (p) => /\d/.test(p) },
  { id: 'sym', label: 'پیتی تایبەت', test: (p) => /[@$!%*?&]/.test(p) },
];
function validatePassword(p) { return PASS_RULES.every(r => r.test(p)); }

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await loadUser(session.user.id);
  sb.auth.onAuthStateChange(async (e, session) => { if (session) await loadUser(session.user.id); else { currentUser = null; render(); } });
  render();
}
async function loadUser(id) { 
  const { data: p } = await sb.from('profiles').select('*').eq('id', id).single(); 
  const { data: { user } } = await sb.auth.getUser();

async function doLogin() { 
  const e = document.getElementById('liEmail').value, p = document.getElementById('liPass').value;
  const a = document.getElementById('loginAlert');
  const at = loginAttempts[e] || { count: 0, blockedUntil: null };
  if(at.blockedUntil && Date.now() < at.blockedUntil) { a.className='alert alert-error show'; a.textContent=`چاوەڕێ بکە ${Math.ceil((at.blockedUntil-Date.now())/60000)} خولەک`; return; }
  const { error } = await sb.auth.signInWithPassword({ email:e, password:p });
  if(error) { 
    at.count = (at.count||0)+1;
    if(at.count>=5){ at.blockedUntil=Date.now()+15*60*1000; at.count=0; a.textContent='زیاتر لە ٥ جار هەوڵت داوە، ١٥ خولەک چاوەڕێ بکە'; }
    else a.textContent=`ئیمەیڵ یان پاسۆورد هەڵەیە (${5-at.count} هەوڵ)`;
    a.className='alert alert-error show';
    loginAttempts[e]=at;
  }
}
async function doRegister() { 
  const u = document.getElementById('ruName').value, e = document.getElementById('rEmail').value, p = document.getElementById('rPass').value;

  const { data, error } = await sb.auth.signUp({ email:e, password:p, options:{ data:{ username:u } } });
  if(error){ a.className='alert alert-error show'; a.textContent=error.message; return; }
  if(data?.user){
    const { count } = await sb.from('profiles').select('*',{ count:'exact', head:true });
    await sb.from('profiles').upsert({ id:data.user.id, username:u, email:e, role:count===0?'owner':'user', permissions:count===0?['all']:[] });
    a.className='alert alert-success show'; a.textContent='✅ ئەکاونت دروست کرا! ئێستا بچۆ ژوورەوە';
    setTimeout(()=>showLogin(),2000);
  }
}

async function openRoom(id) { 
  currentRoomId = id; 
  const { data: room } = await sb.from('rooms').select('*').eq('id', id).single(); 
  if (!room) return; 
  document.getElementById('roomModalTitle').innerHTML = `${room.name} ${room.is_private ? '<i class="fas fa-lock"></i>' : '<i class="fas fa-globe"></i>'}`; 
  await loadRoomMembers(id); 
  if (room.channel_id) { 
    const { data: ch } = await sb.from('channels').select('*').eq('id', room.channel_id).single(); 
    if (ch) { 
      const wrap = document.getElementById('roomVideoWrap'); 
      if (ch.live_url && (ch.live_url.includes('.m3u8') || ch.live_url.includes('hls'))) { 
        wrap.innerHTML = '<video id="roomVideo" controls autoplay style="width:100%;height:100%"></video>'; 
        const v = document.getElementById('roomVideo'); 
        if (roomHls) roomHls.destroy(); 
        roomHls = new Hls(); 
        roomHls.loadSource(ch.live_url); 
        roomHls.attachMedia(v); 
      } else if (ch.live_url) { 
        wrap.innerHTML = `<iframe src="${ch.live_url}" frameborder="0" style="width:100%;height:100%"></iframe>`; 
      } 
    } 
  } 
  document.getElementById('roomModal').classList.add('open'); 
  await loadRoomChat(id); 
}

async function loadRoomMembers(roomId) { 
  const { data } = await sb.from('room_members').select('*, profiles(username)').eq('room_id', roomId); 
  roomMembers = data || []; 
  document.getElementById('roomMemberCount').innerHTML = `${roomMembers.length} کەس`;
}

async function loadRoomChat(roomId) { 
  const { data: messages } = await sb
    .from('room_chats')
    .select('*')
    .eq('room_id', roomId)
    .order('created_at', { ascending: true });
  
  const userIds = [...new Set((messages || []).map(m => m.user_id))];
  const { data: profiles } = await sb
    .from('profiles')
    .select('id, username')
    .in('id', userIds);
  
  const usernameMap = {};
  if (profiles) {
    profiles.forEach(p => { usernameMap[p.id] = p.username; });
  }
  
  roomChats = (messages || []).map(m => ({
    ...m,
    profile_name: usernameMap[m.user_id] || 'بەکارهێنەر'
  }));
  
  renderRoomChats();
  
  if (roomSub) {
    try { sb.removeChannel(roomSub); } catch(e) {}
  }
  
  roomSub = sb
    .channel(`room_${roomId}`)
    .on('postgres_changes', 
      { event: 'INSERT', schema: 'public', table: 'room_chats', filter: `room_id=eq.${roomId}` }, 
      async (payload) => { 
        const { data: userProfile } = await sb
          .from('profiles')
          .select('username')
          .eq('id', payload.new.user_id)
          .single();
        
        const newMsg = {
          ...payload.new,
          profile_name: userProfile?.username || 'بەکارهێنەر'
        };
        roomChats.push(newMsg); 
        renderRoomChats(); 
      }
    )
    .subscribe(); 
}

function renderRoomChats() { 
  const container = document.getElementById('roomChatMessages'); 
  if (!container) return; 
  if (!roomChats || roomChats.length === 0) { 
    container.innerHTML = '<div style="padding:2rem;text-align:center;color:gray">هیچ پەیامێک نیە</div>'; 
    return; 
  }
  container.innerHTML = roomChats.map(msg => { 
    const isOwn = msg.user_id === currentUser?.id; 
    const username = msg.profile_name || 'بەکارهێنەر';
    let messageText = msg.message || ''; 
    messageText = messageText.replace(/@(\w+)/g, '<span class="mention-tag">@$1</span>'); 
    return `<div class="chat-message ${isOwn ? 'own' : 'other'}"><div class="chat-name">${username}</div><div class="chat-bubble">${messageText}</div></div>`; 
  }).join(''); 
  container.scrollTop = container.scrollHeight; 
}

async function sendRoomChat() { 
  const input = document.getElementById('roomChatInput'); 
  const message = input.value.trim(); 
  if (!message) return; 
  if (!currentRoomId) { toast('هیچ ژوورێک کراوە نیە', 'error'); return; }
  input.value = ''; 
  const { error } = await sb.from('room_chats').insert({ 
    room_id: currentRoomId, 
    user_id: currentUser.id, 
    message: message,
    reactions: {}
  }); 
  if (error) { 
    toast('پەیام نەنێردرا', 'error');
    input.value = message;
  } else {
    toast('پەیام نێردرا ✅', 'success');
  }
}

// ==================== FIXED: LEAVE ROOM ====================
async function leaveRoom() { 
  if (!currentRoomId) return;
  if (!confirm('دڵنیای لە دەرچوون؟')) return;
  await sb.from('room_members').delete().eq('room_id', currentRoomId).eq('user_id', currentUser.id);
  const { data: room } = await sb.from('rooms').select('member_count, owner_id').eq('id', currentRoomId).single();
  if (room) {
    const newCount = Math.max(0, (room.member_count || 1) - 1);
    await sb.from('rooms').update({ member_count: newCount }).eq('id', currentRoomId);
    if (room.owner_id === currentUser?.id && newCount === 0) {
      await sb.from('rooms').delete().eq('id', currentRoomId);
      toast('ژوورەکە سڕایەوە');
    } else {
      toast('دەرچوویت ✅');
    }
  }
  closeRoomModal();
  renderRooms();
}

// ==================== FIXED: CLOSE ROOM MODAL (کارا) ====================
function closeRoomModal() { 
  try {
    // 1. مۆدالی ژوور دابخە
    const modal = document.getElementById('roomModal');
    if (modal) {
      modal.classList.remove('open');
      console.log('Modal closed successfully');
    }
    
    // 2. ڤیدیۆی HLS ڕابگرە
    if (roomHls) {
      try {
        roomHls.destroy();
      } catch(e) {
        console.error('HLS destroy error:', e);
      }
      roomHls = null;
    }
    
    // 3. Subscriptionـەکەی چات ببەستە
    if (roomSub) {
      try {
        sb.removeChannel(roomSub);
      } catch(e) {
        console.error('Channel remove error:', e);
      }
      roomSub = null;
    }
    
    // 4. ناوەڕۆکی ڤیدیۆ پاک بکەرەوە
    const videoWrap = document.getElementById('roomVideoWrap');
    if (videoWrap) {
      videoWrap.innerHTML = '';
    }
    
    // 5. پەیامەکانی چات پاک بکەرەوە
    const chatMessages = document.getElementById('roomChatMessages');
    if (chatMessages) {
      chatMessages.innerHTML = '<div style="padding:2rem;text-align:center;color:gray">هیچ پەیامێک نیە</div>';
    }
    
    // 6. ئینپوتەکەی چات پاک بکەرەوە
    const chatInput = document.getElementById('roomChatInput');
    if (chatInput) {
      chatInput.value = '';
    }
    
    // 7. ڕێگای پەڕەکە (overflow) بگەڕێنەوە
    document.body.style.overflow = '';
    
    // 8. ستەیتەکان پاک بکەرەوە
    currentRoomId = null;
    roomChats = [];
    
    console.log('Room closed completely');
    
  } catch (error) {
    console.error('Close room error:', error);
  }
}

// ==================== FIXED: DELETE CHANNEL (کارا) ====================
async function delChannel(id){ 
  if(!confirm('دڵنیای لە سڕینەوەی ئەم کەناڵە؟')) return; 
  
  try {
    // یەکەم: هەموو ژوورەکانی پەیوەست بەم کەناڵە نوێ بکەرەوە (channel_name بەتاڵ بکەرەوە)
    const { error: updateError } = await sb
      .from('rooms')
      .update({ channel_id: null, channel_name: '' })
      .eq('channel_id', id);
    
    if (updateError) {
      console.error('Error updating rooms:', updateError);
    }
    
    // دووەم: کەناڵەکە بسڕەوە
    const { error: deleteError } = await sb
      .from('channels')
      .delete()
      .eq('id', id);
    
    if (deleteError) {
      toast('هەڵە لە سڕینەوەی کەناڵ: ' + deleteError.message, 'error');
      return;
    }
    
    toast('کەناڵ بە سەرکەوتوویی سڕایەوە ✅');
    
    // سێیەم: لیستی کەناڵەکان نوێ بکەرەوە
    await loadAdminChannels();
    
    // چوارەم: ئەگەر لە پەڕەی کەناڵەکان دایت، ئەویش نوێ بکەرەوە
    if (currentPage === 'channels' || currentPage === 'home') {
      renderChannels();
    }
    
  } catch (error) {
    console.error('Delete channel error:', error);
    toast('هەڵەیەک ڕوویدا لە کاتی سڕینەوە', 'error');
  }
}

// ==================== ADMIN ====================
async function renderAdmin() { 
  document.getElementById('pageContent').innerHTML = `<div class="page-header"><h2>⚙️ بەڕێوەبردن</h2></div><div class="admin-grid"><div class="admin-card"><div class="admin-card-title"><i class="fas fa-plus"></i> کەناڵی نوێ</div><div class="admin-form"><input id="cName" placeholder="ناو"><input id="cImage" placeholder="وێنە"><select id="cCat"><option value="kurdish">کوردی</option><option value="sport">وەرزش</option><option value="news">هەواڵ</option><option value="entertainment">هونەری</option></select><input id="cUrl" placeholder="لینکی پەخش"><button class="btn-add" onclick="addChannel()">زیادکردن</button></div></div><div class="admin-card"><div class="admin-card-title"><i class="fas fa-list"></i> کەناڵەکان</div><div id="adminChannels"></div></div>${isOwner()?`<div class="admin-card"><div class="admin-card-title"><i class="fas fa-users"></i> بەکارهێنەران</div><div id="adminUsers"></div></div>`:''}</div>`; 
  await loadAdminChannels(); 
  if(isOwner()) await loadAdminUsers(); 
}
async function loadAdminChannels() { 
  const{data}=await sb.from('channels').select('*'); 
  const c=document.getElementById('adminChannels'); 
  if(!c)return; 
  if(!data?.length){ c.innerHTML='<p>هیچ کەناڵێک نیە</p>'; return; } 
  c.innerHTML=data.map(ch=>`<div class="list-item"><div><div class="list-item-name">${ch.name}</div><div class="list-item-sub">${ch.category}</div></div><button class="btn-del" onclick="delChannel(${ch.id})"><i class="fas fa-trash"></i></button></div>`).join(''); 
}
async function loadAdminUsers() { 
  const{data}=await sb.from('profiles').select('*').order('created_at'); 
  const c=document.getElementById('adminUsers'); 
  if(!c)return; 
  c.innerHTML=data.map(u=>`<div class="list-item"><div><div class="list-item-name">${u.username||u.email}</div><div class="list-item-sub">ڕۆڵ: ${u.role} | ماف: ${(u.permissions||[]).join(',')||'هیچ'}</div></div><button class="btn-edit" onclick="openPermModal('${u.id}','${u.username||u.email}')"><i class="fas fa-edit"></i></button><button class="btn-del" onclick="delUser('${u.id}')"><i class="fas fa-trash"></i></button></div>`).join(''); 
}
async function addChannel(){ const n=document.getElementById('cName').value, img=document.getElementById('cImage').value, cat=document.getElementById('cCat').value, url=document.getElementById('cUrl').value; if(!n||!url){ toast('ناو و لینک پێویستە','error'); return; } await sb.from('channels').insert({ name:n, image:img||null, category:cat, live_url:url, views:0 }); toast('کەناڵ زیاد کرا ✅'); await loadAdminChannels(); renderChannels(); }
async function delUser(id){ if(!confirm('دڵنیای؟')) return; await sb.from('profiles').delete().eq('id',id); toast('بەکارهێنەر سڕایەوە'); await loadAdminUsers(); }
const PERMS = [{key:'manage_channels',label:'بەڕێوەبردنی کەناڵ'},{key:'manage_rooms',label:'بەڕێوەبردنی ژوور'},{key:'manage_users',label:'بەڕێوەبردنی بەکارهێنەران'},{key:'all',label:'هەموو مافەکان'}];
async function openPermModal(id,name){ permUserId=id; const{data:u}=await sb.from('profiles').select('permissions').eq('id',id).single(); const perms=u?.permissions||[]; permData={}; PERMS.forEach(p=>permData[p.key]=perms.includes(p.key)); document.getElementById('permModalTitle').innerHTML=`مافەکانی ${name}`; document.getElementById('permModalBody').innerHTML=PERMS.map(p=>`<div class="perm-item"><span>${p.label}</span><div class="toggle ${permData[p.key]?'on':''}" onclick="togglePerm('${p.key}')"></div></div>`).join(''); document.getElementById('permModal').classList.add('open'); }
function togglePerm(k){ permData[k]=!permData[k]; const t=document.querySelector(`#permModal .toggle[onclick="togglePerm('${k}')"]`); if(t) t.classList.toggle('on',permData[k]); }
async function savePerms(){ const perms=Object.entries(permData).filter(([_,v])=>v).map(([k])=>k); await sb.from('profiles').update({permissions:perms}).eq('id',permUserId); closePermModal(); toast('مافەکان هەڵگیران ✅'); await loadAdminUsers(); }
function closePermModal(){ document.getElementById('permModal').classList.remove('open'); }

init();
</script>
