<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-lang="ckb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e63946">
<meta name="description" content="KURD WATCH - پەخشی زیندووی کەناڵە کوردییەکان">
<title>KURD WATCH — کەناڵی کوردی زیندوو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & TOKENS ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;--bg2:#0d0d1c;--bg3:#141428;--card:#101020;
  --border:#ffffff08;--border2:#ffffff12;--border3:#ffffff1e;
  --red:#e63946;--red2:#c1121f;--red-glow:rgba(230,57,70,0.2);
  --red-soft:rgba(230,57,70,0.08);
  --text:#eeeeff;--text2:#9090b8;--text3:#44446a;
  --green:#10b981;--yellow:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --gradient:linear-gradient(135deg,#e63946 0%,#c1121f 100%);
  --grad-purple:linear-gradient(135deg,#8b5cf6,#6d28d9);
  --grad-blue:linear-gradient(135deg,#3b82f6,#1d4ed8);
  --grad-green:linear-gradient(135deg,#10b981,#059669);
  --radius:20px;--radius-sm:14px;--radius-xs:10px;
  --shadow:0 24px 64px rgba(0,0,0,0.7);
  --shadow-red:0 8px 32px rgba(230,57,70,0.28);
  --shadow-card:0 4px 24px rgba(0,0,0,0.4);
  --tr:all 0.22s cubic-bezier(0.4,0,0.2,1);
  --glass:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.07);
}
body.light{
  --bg:#f0f0f8;--bg2:#ffffff;--bg3:#e8e8f4;--card:#ffffff;
  --border:#e0e0ee;--border2:#d0d0e8;--border3:#c0c0d8;
  --text:#08081a;--text2:#484870;--text3:#9090b0;
  --shadow:0 8px 32px rgba(0,0,0,0.1);
  --shadow-red:0 8px 32px rgba(230,57,70,0.18);
  --glass:rgba(255,255,255,0.6);
  --glass-border:rgba(0,0,0,0.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}

/* ── AMBIENT BG ── */
.hero-bg{position:fixed;top:0;left:0;right:0;height:100vh;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbFloat 10s ease-in-out infinite}
.orb-1{width:600px;height:600px;background:rgba(230,57,70,0.1);top:-200px;right:-150px;animation-delay:0s}
.orb-2{width:450px;height:450px;background:rgba(139,92,246,0.07);bottom:-100px;left:-100px;animation-delay:-4s}
.orb-3{width:350px;height:350px;background:rgba(59,130,246,0.05);top:35%;left:25%;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-25px) scale(1.07)}}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:900;height:66px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);background:rgba(6,6,15,0.8);border-bottom:1px solid var(--border2)}
body.light .header{background:rgba(255,255,255,0.88)}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.logo-mark{position:relative;width:40px;height:40px;flex-shrink:0}
.logo-mark-inner{width:40px;height:40px;background:var(--gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:var(--shadow-red)}
.logo-pulse{position:absolute;inset:-5px;border-radius:17px;border:1.5px solid rgba(230,57,70,0.5);animation:logoPulse 2.8s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:0;transform:scale(1.18)}}
.logo-text{font-size:1.1rem;font-weight:900;letter-spacing:-0.5px;line-height:1.1}
.logo-text em{color:var(--red);font-style:normal}
.logo-tag{font-size:0.58rem;color:var(--text3);font-weight:600;letter-spacing:1.8px;text-transform:uppercase;margin-top:1px}
.hcenter{flex:1;max-width:420px;margin:0 1rem;position:relative}
.hsearch{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:2rem;padding:9px 16px 9px 44px;color:var(--text);font-size:0.82rem;outline:none;transition:var(--tr)}
.hsearch:focus{border-color:var(--red);background:var(--bg2);box-shadow:0 0 0 4px var(--red-glow)}
.hsearch-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;transition:color 0.2s}
.hsearch:focus~.hsearch-icon{color:var(--red)}
.sdrop{position:absolute;top:calc(100%+8px);inset-inline:0;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:6px;z-index:2000;display:none;box-shadow:var(--shadow);animation:dropIn 0.18s ease}
.sdrop.open{display:block}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.si{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:0.81rem;color:var(--text2);transition:var(--tr)}
.si:hover{background:var(--bg3);color:var(--text)}
.si-icon{width:32px;height:32px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border)}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hbtn{width:38px;height:38px;border-radius:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;transition:var(--tr);cursor:pointer}
.hbtn:hover{background:var(--red);color:white;border-color:var(--red);transform:scale(1.06)}
.ndot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg2);animation:pDot 1.5s ease infinite}
@keyframes pDot{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.lang-sw{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:3px}
.lang-btn{padding:4px 11px;border-radius:8px;border:none;background:none;color:var(--text2);font-size:0.7rem;font-weight:800;letter-spacing:0.3px;transition:var(--tr);cursor:pointer}
.lang-btn.active{background:var(--gradient);color:white;box-shadow:var(--shadow-red)}
.uchip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);padding:5px 12px 5px 5px;border-radius:2rem;cursor:pointer;transition:var(--tr)}
.uchip:hover{border-color:var(--red)}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;box-shadow:var(--shadow-red);overflow:hidden;background:var(--gradient)}
.uav img{width:100%;height:100%;object-fit:cover}
.uname{font-size:0.79rem;font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udrop{position:absolute;top:calc(100%+10px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:6px;min-width:210px;z-index:2000;display:none;box-shadow:var(--shadow);animation:dropIn 0.18s ease}
.udrop.open{display:block}
.udrop-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);margin-bottom:5px}
.udrop-name{font-size:0.85rem;font-weight:800}
.udrop-role{font-size:0.68rem;color:var(--red);font-weight:700;margin-top:2px}
.ditem{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;color:var(--text2);font-size:0.79rem;cursor:pointer;width:100%;text-align:right;transition:var(--tr)}
.ditem:hover{background:var(--bg3);color:var(--text)}
.ditem.danger{color:#ff6b7a}
.ditem.danger:hover{background:rgba(230,57,70,0.08)}
.ditem i{width:16px;text-align:center;font-size:13px}
.hwrap{position:relative}

/* ── AUTH ── */
.auth-pg{min-height:calc(100vh - 66px);display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1}
.auth-box{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border2);border-radius:26px;padding:2.4rem;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo-icon{width:68px;height:68px;background:var(--gradient);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;box-shadow:var(--shadow-red)}
.auth-logo-title{font-size:1.7rem;font-weight:900;letter-spacing:-1px}
.auth-logo-sub{font-size:0.72rem;color:var(--text3);margin-top:5px;letter-spacing:1.2px;text-transform:uppercase}
.auth-tabs{display:flex;background:var(--bg3);border-radius:14px;padding:4px;margin-bottom:1.8rem;gap:3px}
.auth-tab{flex:1;padding:11px;border:none;background:none;color:var(--text2);font-size:0.83rem;font-weight:700;border-radius:11px;cursor:pointer;transition:var(--tr)}
.auth-tab.active{background:var(--gradient);color:white;box-shadow:var(--shadow-red)}
.fg{margin-bottom:1rem}
.fl{display:block;font-size:0.68rem;font-weight:800;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.fi{width:100%;padding:12px 14px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:13px;color:var(--text);font-size:0.87rem;outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);background:var(--bg2)}
.btn-pri{width:100%;padding:13px;background:var(--gradient);border:none;border-radius:13px;color:white;font-size:0.88rem;font-weight:800;cursor:pointer;transition:var(--tr);box-shadow:var(--shadow-red);letter-spacing:0.3px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-pri:hover{opacity:0.92;transform:translateY(-2px);box-shadow:0 14px 44px rgba(230,57,70,0.38)}
.btn-pri:active{transform:translateY(0)}
.btn-pri:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.alert{padding:11px 14px;border-radius:12px;font-size:0.79rem;margin-bottom:1rem;display:none;animation:dropIn 0.2s ease}
.alert.show{display:block}
.alert-err{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);color:#ff8590}
.alert-ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:var(--green)}
.prules{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.prule{font-size:0.69rem;display:flex;align-items:center;gap:5px;transition:color 0.2s}

/* ── LAYOUT ── */
.app{display:flex;min-height:calc(100vh - 66px);position:relative;z-index:1}
.sidebar{width:244px;min-width:244px;background:var(--bg2);border-left:1px solid var(--border);padding:1.2rem 0;position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto;display:flex;flex-direction:column}
.sb-sec{padding:0 0.8rem;margin-bottom:1.5rem}
.sb-lbl{font-size:0.58rem;font-weight:800;color:var(--text3);padding:0 0.7rem;margin-bottom:0.5rem;letter-spacing:1.8px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:12px;cursor:pointer;color:var(--text2);font-size:0.81rem;font-weight:500;width:100%;text-align:right;background:none;border:none;transition:var(--tr);position:relative}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:linear-gradient(135deg,rgba(230,57,70,0.18),rgba(193,18,31,0.06));color:var(--red);font-weight:700}
.sb-item.active::before{content:'';position:absolute;right:0;top:22%;bottom:22%;width:3px;background:var(--gradient);border-radius:2px 0 0 2px}
.sb-item i{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sb-badge{margin-right:auto;background:var(--red);color:white;font-size:0.58rem;font-weight:800;padding:2px 7px;border-radius:2rem}
.sb-xp{margin-right:auto;background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.08));color:var(--yellow);font-size:0.62rem;font-weight:800;padding:2px 8px;border-radius:2rem;border:1px solid rgba(245,158,11,0.2)}
.sb-div{height:1px;background:var(--border);margin:0.5rem 1.2rem}
.sb-bot{margin-top:auto;padding:0.8rem}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border-radius:14px;border:1px solid var(--border)}
.sb-uav{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0;box-shadow:var(--shadow-red);overflow:hidden}
.sb-uav img{width:100%;height:100%;object-fit:cover}
.sb-uinfo{flex:1;min-width:0}
.sb-uname{font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:0.63rem;color:var(--red);font-weight:700;margin-top:1px}
.content{flex:1;padding:1.6rem;overflow-x:hidden;min-width:0}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.6rem;flex-wrap:wrap;gap:10px}
.ph-left{display:flex;align-items:center;gap:12px}
.ph-icon{width:44px;height:44px;background:linear-gradient(135deg,rgba(230,57,70,0.2),rgba(230,57,70,0.04));border:1px solid rgba(230,57,70,0.18);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px}
.ph-title{font-size:1.3rem;font-weight:900;letter-spacing:-0.5px}
.ph-sub{font-size:0.71rem;color:var(--text3);margin-top:2px}
.btn-create{display:flex;align-items:center;gap:7px;background:var(--gradient);border:none;color:white;padding:10px 20px;border-radius:12px;font-size:0.8rem;font-weight:800;cursor:pointer;transition:var(--tr);box-shadow:var(--shadow-red);letter-spacing:0.3px}
.btn-create:hover{opacity:0.9;transform:translateY(-2px)}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:7px;margin-bottom:1.4rem;flex-wrap:wrap}
.fchip{padding:7px 18px;border-radius:2rem;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:0.78rem;font-weight:600;cursor:pointer;transition:var(--tr);white-space:nowrap}
.fchip:hover,.fchip.active{background:var(--gradient);color:white;border-color:transparent;box-shadow:0 4px 14px var(--red-glow)}

/* ── CHANNEL CARDS ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:1.1rem}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:var(--tr);position:relative}
.ch-card:hover{transform:translateY(-7px);border-color:rgba(230,57,70,0.35);box-shadow:0 20px 56px rgba(230,57,70,0.14)}
.ch-thumb{position:relative;height:148px;overflow:hidden;background:var(--bg3)}
.ch-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.45s ease}
.ch-card:hover .ch-thumb img{transform:scale(1.1)}
.ch-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,0.75) 100%);opacity:0;transition:opacity 0.3s}
.ch-card:hover .ch-overlay{opacity:1}
.live-badge{position:absolute;top:10px;right:10px;background:var(--red);color:white;padding:3px 10px;border-radius:2rem;font-size:0.6rem;font-weight:800;display:flex;align-items:center;gap:5px;box-shadow:0 2px 12px rgba(230,57,70,0.55);letter-spacing:0.5px}
.live-dot{width:5px;height:5px;border-radius:50%;background:white;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.fav-btn{position:absolute;top:10px;left:10px;width:32px;height:32px;border-radius:9px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr);opacity:0;transform:scale(0.8)}
.ch-card:hover .fav-btn,.fav-btn.active{opacity:1;transform:scale(1)}
.fav-btn.active{color:#f59e0b;background:rgba(245,158,11,0.22);border-color:rgba(245,158,11,0.35)}
.ch-play{position:absolute;bottom:10px;right:10px;width:38px;height:38px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;color:white;opacity:0;transform:scale(0.7);transition:var(--tr);box-shadow:var(--shadow-red)}
.ch-card:hover .ch-play{opacity:1;transform:scale(1)}
.wl-btn{position:absolute;bottom:10px;left:10px;width:32px;height:32px;border-radius:9px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr);opacity:0;transform:scale(0.8)}
.ch-card:hover .wl-btn,.wl-btn.active{opacity:1;transform:scale(1)}
.wl-btn.active{color:var(--blue);background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.35)}
.ch-body{padding:13px 15px}
.ch-name{font-size:0.9rem;font-weight:700;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{display:flex;justify-content:space-between;align-items:center}
.ch-cat{font-size:0.63rem;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:2rem;font-weight:700;border:1px solid var(--border)}
.ch-viewers{font-size:0.63rem;color:var(--text3);display:flex;align-items:center;gap:4px}
.ch-viewers .vdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}

/* ── ROOMS ── */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(296px,1fr));gap:1.1rem}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.room-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:3px}
.room-card.public::before{background:var(--grad-green)}
.room-card.private::before{background:linear-gradient(to bottom,var(--yellow),#d97706)}
.room-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-card)}
.room-name{font-size:0.97rem;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.rbadge{font-size:0.6rem;padding:2px 9px;border-radius:2rem;display:inline-flex;align-items:center;gap:3px;font-weight:700}
.rbadge.public{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.18)}
.rbadge.private{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.18)}
.room-desc{font-size:0.74rem;color:var(--text3);margin-bottom:10px;line-height:1.5}
.room-foot{display:flex;align-items:center;justify-content:space-between;font-size:0.68rem;flex-wrap:wrap;gap:5px}
.room-members{display:flex;align-items:center;gap:4px;color:var(--text3)}
.room-owner{background:var(--red-soft);color:var(--red);padding:2px 9px;border-radius:2rem;font-size:0.61rem;font-weight:800;border:1px solid rgba(230,57,70,0.18)}
.rml{margin-top:10px;padding-top:9px;border-top:1px solid var(--border)}
.rml-t{font-size:0.61rem;color:var(--text3);margin-bottom:5px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
.rml-tags{display:flex;flex-wrap:wrap;gap:4px}
.rml-tag{font-size:0.62rem;background:var(--bg3);padding:2px 9px;border-radius:2rem;border:1px solid var(--border)}

/* ── MODALS ── */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:3000;justify-content:center;align-items:center;padding:1rem;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.mover.open{display:flex;animation:fadeIn 0.22s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* stream modal */
.stream-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;width:100%;max-width:960px;overflow:hidden;box-shadow:var(--shadow);animation:slideUp 0.28s cubic-bezier(0.4,0,0.2,1)}
.smod-head{padding:1rem 1.3rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.smod-live{display:flex;align-items:center;gap:5px;background:var(--red);color:white;padding:3px 10px;border-radius:2rem;font-size:0.6rem;font-weight:800}
.vwrap{position:relative;padding-bottom:56.25%;height:0;background:#000}
.vwrap video,.vwrap iframe{position:absolute;inset:0;width:100%;height:100%}
.vempty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px}
.vempty i{font-size:3.5rem;opacity:0.12}

/* room modal */
.room-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;width:100%;max-width:1100px;height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow);animation:slideUp 0.28s cubic-bezier(0.4,0,0.2,1)}
.rmod-head{padding:1rem 1.3rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rmod-body{flex:1;display:flex;overflow:hidden;min-height:0}
.rvid-side{flex:1;min-width:0;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.rchat-side{width:315px;display:flex;flex-direction:column;flex-shrink:0}
.r-ch-bar{padding:8px 11px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.r-ch-sel{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:7px 11px;color:var(--text);font-size:0.78rem;outline:none;cursor:pointer}
.r-ch-sel:focus{border-color:var(--red)}
.btn-ch{background:var(--gradient);border:none;color:white;padding:7px 13px;border-radius:9px;font-size:0.75rem;font-weight:800;cursor:pointer;transition:var(--tr);white-space:nowrap}
.btn-ch:hover{opacity:0.88}

/* small modals */
.sml{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:1.8rem;max-width:480px;width:100%;box-shadow:var(--shadow);animation:slideUp 0.28s cubic-bezier(0.4,0,0.2,1)}
.sml h3{font-size:1.05rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}
.radio-row{display:flex;gap:10px;margin-bottom:1.2rem}
.ropt{flex:1;padding:14px;border:2px solid var(--border2);border-radius:14px;text-align:center;cursor:pointer;font-size:0.82rem;display:flex;flex-direction:column;align-items:center;gap:7px;transition:var(--tr)}
.ropt i{font-size:1.4rem}
.ropt.sel{border-color:var(--red);background:linear-gradient(135deg,rgba(230,57,70,0.12),rgba(230,57,70,0.04))}
.mfoot{display:flex;gap:8px;margin-top:1.2rem}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border2);border-radius:12px;background:none;color:var(--text2);cursor:pointer;font-size:0.83rem;font-family:inherit;transition:var(--tr)}
.btn-cancel:hover{background:var(--bg3)}
.btn-ok{flex:2;padding:12px;background:var(--gradient);border:none;border-radius:12px;color:white;cursor:pointer;font-size:0.83rem;font-weight:800;font-family:inherit;transition:var(--tr);box-shadow:var(--shadow-red)}
.btn-ok:hover{opacity:0.9;transform:translateY(-1px)}
.cbtn{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:var(--tr)}
.cbtn:hover{background:var(--red);color:white;border-color:var(--red)}
.btn-leave{background:rgba(230,57,70,0.08);border:1px solid rgba(230,57,70,0.18);color:var(--red);padding:7px 14px;border-radius:10px;font-size:0.73rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:var(--tr);font-family:inherit}
.btn-leave:hover{background:var(--red);color:white}

/* ── CHAT ── */
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:9px;min-height:0}
.cmsg{display:flex;flex-direction:column}
.cmsg.own{align-items:flex-end}
.cmsg.other{align-items:flex-start}
.cbubble{max-width:82%;padding:9px 13px;border-radius:16px;font-size:0.8rem;line-height:1.5;word-break:break-word;border:1px solid var(--border)}
.cmsg.own .cbubble{background:linear-gradient(135deg,rgba(230,57,70,0.2),rgba(230,57,70,0.08));border-color:rgba(230,57,70,0.22);border-bottom-left-radius:5px}
.cmsg.other .cbubble{background:var(--bg3);border-bottom-right-radius:5px}
.cname{font-size:0.61rem;color:var(--text3);margin-bottom:3px;font-weight:800}
.mention{color:var(--red);font-weight:700;background:rgba(230,57,70,0.1);padding:1px 5px;border-radius:5px}
/* Reactions */
.creact-wrap{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.creact{background:var(--bg3);border:1px solid var(--border2);border-radius:2rem;padding:3px 8px;font-size:0.75rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:3px}
.creact:hover{border-color:var(--red);background:var(--red-soft)}
.creact.mine{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.cthread{font-size:0.67rem;color:var(--red);cursor:pointer;margin-top:3px;display:flex;align-items:center;gap:3px;opacity:0.8;transition:var(--tr)}
.cthread:hover{opacity:1}
/* Poll */
.chat-poll{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:12px;margin:5px 0;max-width:280px}
.poll-q{font-size:0.82rem;font-weight:700;margin-bottom:9px}
.poll-opt{padding:9px 13px;border:1.5px solid var(--border2);border-radius:10px;margin-bottom:6px;cursor:pointer;font-size:0.79rem;transition:var(--tr);position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--red)}
.poll-opt.voted{border-color:var(--red);background:rgba(230,57,70,0.08)}
.poll-bar{position:absolute;top:0;left:0;bottom:0;background:rgba(230,57,70,0.12);transition:width 0.5s ease;border-radius:8px}
.poll-txt{position:relative;z-index:1;display:flex;justify-content:space-between}
.poll-pct{font-size:0.67rem;color:var(--red);font-weight:700}
/* GIF */
.gif-img{max-width:220px;border-radius:10px;cursor:pointer;display:block;margin-top:4px}
/* Thread */
.thread-panel{position:fixed;left:0;top:0;width:300px;height:100%;background:var(--bg2);border-right:1px solid var(--border2);z-index:4000;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.28s ease;box-shadow:var(--shadow)}
.thread-panel.open{transform:translateX(0)}
.thread-head{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.thread-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:8px}

.eq-bar{display:flex;gap:5px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
.eqbtn{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:3px 5px;border-radius:7px;transition:var(--tr)}
.eqbtn:hover{background:var(--bg3);transform:scale(1.2)}
.chat-bar{padding:9px 10px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0}
.cinput{flex:1;background:var(--bg3);border:1.5px solid var(--border2);border-radius:2rem;padding:9px 16px;color:var(--text);font-size:0.81rem;outline:none;transition:var(--tr)}
.cinput:focus{border-color:var(--red);background:var(--bg2)}
.csend{width:38px;height:38px;border-radius:50%;background:var(--gradient);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr);box-shadow:var(--shadow-red)}
.csend:hover{opacity:0.85;transform:scale(1.12)}
.cpoll-btn,.cgif-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr);flex-shrink:0}
.cpoll-btn:hover{background:var(--purple);color:white;border-color:var(--purple)}
.cgif-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
.modbtn{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);color:var(--red);padding:2px 8px;border-radius:6px;font-size:0.63rem;cursor:pointer;transition:var(--tr);font-family:inherit;margin-right:5px}
.modbtn:hover{background:var(--red);color:white}
.membar{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.memcnt{font-size:0.72rem;color:var(--text2);font-weight:600}
.mavs{display:flex}
.mav{width:24px;height:24px;border-radius:50%;background:var(--gradient);border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;margin-left:-6px}

/* ── NOTIFICATIONS ── */
.notif-panel{position:fixed;top:74px;left:1rem;width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;z-index:2500;box-shadow:var(--shadow);overflow:hidden;display:none;animation:dropIn 0.18s ease}
.notif-panel.open{display:block}
.notif-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-head h4{font-size:0.86rem;font-weight:800}
.notif-clr{font-size:0.7rem;color:var(--red);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:700}
.nlist{max-height:360px;overflow-y:auto}
.nitem{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:var(--tr)}
.nitem:hover{background:var(--bg3)}
.nitem.unread{background:linear-gradient(135deg,rgba(230,57,70,0.04),transparent)}
.nico{width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--border)}
.ntxt{font-size:0.77rem;line-height:1.4}
.ntime{font-size:0.62rem;color:var(--text3);margin-top:3px}
.nempty{padding:2.5rem;text-align:center;color:var(--text3);font-size:0.8rem}

/* ── TOAST ── */
.twrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:11px 16px;display:flex;align-items:center;gap:9px;font-size:0.8rem;animation:toastIn 0.3s cubic-bezier(0.4,0,0.2,1);box-shadow:var(--shadow);max-width:320px}
@keyframes toastIn{from{opacity:0;transform:translateX(20px) scale(0.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(20px)}}

/* ── EMPTY & LOADING ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty i{font-size:3.5rem;margin-bottom:1rem;opacity:0.1;display:block}
.empty h3{font-size:0.9rem;font-weight:700;margin-bottom:6px;color:var(--text2)}
.empty p{font-size:0.77rem;opacity:0.7}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem}
.spinner{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ADMIN ── */
.atabs{display:flex;gap:6px;margin-bottom:1.4rem;flex-wrap:wrap}
.atab{padding:8px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:0.79rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit}
.atab.active{background:var(--gradient);color:white;border-color:transparent;box-shadow:var(--shadow-red)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.acard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem}
.acard-t{font-size:0.78rem;font-weight:800;color:var(--text2);margin-bottom:1.1rem;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:0.5px}
.acard-t i{color:var(--red)}
.aform input,.aform select,.aform textarea{width:100%;padding:9px 13px;margin-bottom:8px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:11px;color:var(--text);font-size:0.82rem;outline:none;font-family:inherit;transition:var(--tr)}
.aform input:focus,.aform select:focus{border-color:var(--red)}
.btn-add{width:100%;padding:10px;background:var(--gradient);border:none;border-radius:11px;color:white;cursor:pointer;font-size:0.83rem;font-weight:800;font-family:inherit;transition:var(--tr);box-shadow:var(--shadow-red)}
.btn-add:hover{opacity:0.9}
.litem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:12px;margin-bottom:7px;transition:var(--tr)}
.litem:hover{background:var(--bg3);border-color:var(--border2)}
.li-n{font-size:0.81rem;font-weight:700}
.li-s{font-size:0.68rem;color:var(--text3);margin-top:2px}
.btn-del,.btn-edit{width:32px;height:32px;border-radius:9px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none;transition:var(--tr)}
.btn-del{background:rgba(230,57,70,0.1);color:var(--red)}
.btn-del:hover{background:var(--red);color:white}
.btn-edit{background:rgba(59,130,246,0.1);color:var(--blue);margin-left:4px}
.btn-edit:hover{background:var(--blue);color:white}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.4rem}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;text-align:center;position:relative;overflow:hidden;transition:var(--tr)}
.scard:hover{transform:translateY(-4px);box-shadow:var(--shadow-card)}
.sval{font-size:2.2rem;font-weight:900;line-height:1;margin-bottom:5px;letter-spacing:-1px}
.slbl{font-size:0.68rem;color:var(--text3);font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.sico{font-size:1.8rem;margin-bottom:9px;opacity:0.55}

/* ── GAMIFICATION ── */
.xp-bar-wrap{background:var(--bg3);border-radius:2rem;height:8px;overflow:hidden;margin:8px 0}
.xp-bar{height:100%;background:var(--gradient);border-radius:2rem;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.badge-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.badge{padding:8px 14px;border-radius:2rem;font-size:0.75rem;font-weight:700;display:flex;align-items:center;gap:6px;border:1px solid;transition:var(--tr)}
.badge.earned{background:linear-gradient(135deg,rgba(245,158,11,0.18),rgba(245,158,11,0.05));border-color:rgba(245,158,11,0.3);color:var(--yellow)}
.badge.locked{background:var(--bg3);border-color:var(--border);color:var(--text3)}
.streak-card{background:linear-gradient(135deg,rgba(230,57,70,0.15),rgba(230,57,70,0.04));border:1px solid rgba(230,57,70,0.18);border-radius:var(--radius);padding:1.2rem;display:flex;align-items:center;gap:14px;margin-bottom:1rem}
.streak-num{font-size:2.8rem;font-weight:900;color:var(--red);letter-spacing:-2px;line-height:1}
.streak-info{flex:1}
.streak-title{font-size:0.9rem;font-weight:800;margin-bottom:3px}
.streak-sub{font-size:0.72rem;color:var(--text3)}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;transition:var(--tr)}
.lb-row:hover{background:var(--bg3)}
.lb-row.me{background:linear-gradient(135deg,rgba(230,57,70,0.1),rgba(230,57,70,0.04));border:1px solid rgba(230,57,70,0.15)}
.lb-rank{font-size:1rem;font-weight:900;width:28px;text-align:center;flex-shrink:0}
.lb-rank.top{color:var(--yellow)}
.lb-av{width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0}
.lb-name{flex:1;font-size:0.82rem;font-weight:700}
.lb-xp{font-size:0.75rem;color:var(--yellow);font-weight:800}

/* ── CATEGORIES ── */
.ctags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.ctag{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border2);border-radius:2rem;padding:5px 13px;font-size:0.79rem;transition:var(--tr)}
.ctag:hover{border-color:var(--red)}
.ctag-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0;line-height:1;transition:var(--tr)}
.ctag-del:hover{color:var(--red)}
.cat-add{display:flex;gap:7px;margin-top:10px}
.cat-inp{flex:1;padding:9px 13px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:11px;color:var(--text);font-size:0.82rem;outline:none;font-family:inherit;transition:var(--tr)}
.cat-inp:focus{border-color:var(--red)}
.cat-addbtn{padding:9px 14px;background:var(--gradient);border:none;border-radius:11px;color:white;font-size:0.79rem;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-red);white-space:nowrap}

/* ── PERMS ── */
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.toggle{width:44px;height:24px;background:var(--bg);border-radius:12px;position:relative;cursor:pointer;border:1.5px solid var(--border2);transition:var(--tr);flex-shrink:0}
.toggle.on{background:var(--red);border-color:var(--red)}
.toggle::after{content:'';position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:white;transition:transform 0.22s ease;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
.toggle.on::after{transform:translateX(-20px)}

/* ── LOG TABLE ── */
.log-table{width:100%;border-collapse:collapse;font-size:0.78rem}
.log-table th{padding:9px 12px;text-align:right;font-size:0.67rem;font-weight:800;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px}
.log-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.log-table tr:hover td{background:var(--bg3)}
.lbadge{padding:2px 9px;border-radius:2rem;font-size:0.61rem;font-weight:700}
.lbadge.join{background:rgba(16,185,129,0.1);color:var(--green)}
.lbadge.leave{background:rgba(245,158,11,0.1);color:var(--yellow)}
.lbadge.chat{background:rgba(59,130,246,0.1);color:var(--blue)}
.lbadge.del{background:rgba(230,57,70,0.1);color:var(--red)}

/* ── PROFILE ── */
.prof-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;max-width:560px;margin-bottom:1rem}
.prof-avwrap{position:relative;display:inline-block;margin-bottom:1.2rem}
.prof-avatar{width:78px;height:78px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:white;box-shadow:var(--shadow-red);overflow:hidden;cursor:pointer}
.prof-avatar img{width:100%;height:100%;object-fit:cover}
.prof-av-edit{position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-radius:50%;background:var(--gradient);border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;cursor:pointer;transition:var(--tr)}
.prof-av-edit:hover{transform:scale(1.15)}
.prof-info{padding:1rem;background:var(--bg3);border-radius:14px;border:1px solid var(--border);margin-bottom:1.2rem}
.prof-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:0.82rem}
.prof-row:not(:last-child){border-bottom:1px solid var(--border)}
.prof-lbl{color:var(--text3);font-size:0.72rem;font-weight:700}
.prof-val{font-weight:700}
.prof-tabs{display:flex;gap:6px;margin-bottom:1.2rem}
.prof-tab{padding:8px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:0.78rem;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit}
.prof-tab.active{background:var(--gradient);color:white;border-color:transparent}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:0.8rem;cursor:pointer;transition:var(--tr)}
.hist-item:hover{color:var(--red)}
.hist-item i{color:var(--red);width:16px;text-align:center}
/* Pass change */
.pass-strength{height:4px;border-radius:2rem;margin-top:6px;transition:width 0.3s,background 0.3s}

/* ── ONBOARDING ── */
.ob-over{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:9000;display:flex;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(24px)}
.ob-box{background:var(--bg2);border:1px solid var(--border2);border-radius:28px;padding:2.4rem;max-width:500px;width:100%;box-shadow:var(--shadow)}
.ob-steps{display:flex;gap:6px;margin-bottom:2rem;justify-content:center}
.ob-step{width:28px;height:4px;border-radius:2px;background:var(--border2);transition:var(--tr)}
.ob-step.active{background:var(--red);width:44px}
.ob-step.done{background:var(--green)}
.ob-icon{width:72px;height:72px;background:linear-gradient(135deg,rgba(230,57,70,0.2),rgba(230,57,70,0.04));border:1px solid rgba(230,57,70,0.18);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:33px;margin:0 auto 1.2rem}
.ob-title{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:8px;letter-spacing:-0.5px}
.ob-sub{font-size:0.8rem;color:var(--text2);text-align:center;margin-bottom:1.8rem;line-height:1.6}
.ob-cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.5rem}
.ob-cat{padding:8px 18px;border:2px solid var(--border2);border-radius:2rem;font-size:0.8rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.ob-cat.sel{border-color:var(--red);background:linear-gradient(135deg,rgba(230,57,70,0.14),rgba(230,57,70,0.04));color:var(--red)}
.ob-btn-row{display:flex;gap:8px}
.ob-skip{flex:1;padding:12px;border:1px solid var(--border2);border-radius:12px;background:none;color:var(--text2);cursor:pointer;font-family:inherit;font-size:0.83rem;transition:var(--tr)}
.ob-skip:hover{background:var(--bg3)}
.ob-next{flex:2;padding:12px;background:var(--gradient);border:none;border-radius:12px;color:white;cursor:pointer;font-size:0.83rem;font-weight:800;font-family:inherit;transition:var(--tr);box-shadow:var(--shadow-red)}
.ob-next:hover{opacity:0.9;transform:translateY(-1px)}

/* ── PiP ── */
.pip-wrap{position:fixed;bottom:1.5rem;left:1.5rem;z-index:800;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border2);background:#000;cursor:grab;display:none}
.pip-wrap.show{display:block}
.pip-wrap video,.pip-wrap iframe{width:280px;height:158px;display:block;pointer-events:none}
.pip-hd{background:var(--bg2);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border)}
.pip-title{font-size:0.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.pip-x{width:22px;height:22px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr)}
.pip-x:hover{background:var(--red);color:white;border-color:var(--red)}

/* ── PWA ── */
.pwa-bar{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:13px 18px;display:none;align-items:center;gap:12px;z-index:5000;box-shadow:var(--shadow);font-size:0.81rem;max-width:360px;width:calc(100% - 2rem)}
.pwa-bar.show{display:flex}
.pwa-install{background:var(--gradient);color:white;border:none;padding:8px 16px;border-radius:9px;cursor:pointer;font-size:0.78rem;font-weight:800;white-space:nowrap;font-family:inherit;box-shadow:var(--shadow-red)}
.pwa-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;margin-right:auto;padding:0}

/* ── BOTTOM NAV ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:800;backdrop-filter:blur(20px)}
.bnav-inner{display:flex;justify-content:space-around;align-items:center}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;color:var(--text3);font-size:0.6rem;cursor:pointer;border-radius:10px;border:none;background:none;transition:var(--tr);font-family:inherit;position:relative}
.bnav-item i{font-size:20px}
.bnav-item.active{color:var(--red)}
.bnav-item.active i{transform:scale(1.1)}
.bnav-item span{font-weight:600}
.bn-dot{position:absolute;top:2px;right:8px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

/* ── RESPONSIVE ── */
@media(max-width:960px){.sgrid{grid-template-columns:repeat(2,1fr)}.agrid{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{display:none}.hcenter{display:none}
  .bnav{display:block}
  .content{padding:1rem;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  .rmod-body{flex-direction:column}
  .rchat-side{width:100%;height:230px;border-left:none;border-top:1px solid var(--border)}
  .rvid-side{flex:none}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(156px,1fr));gap:0.8rem}
  .ch-thumb{height:110px}
  .notif-panel{left:0.5rem;right:0.5rem;width:auto}
  .twrap{left:1rem;right:1rem;bottom:calc(72px + env(safe-area-inset-bottom))}
  .pip-wrap{bottom:calc(72px + env(safe-area-inset-bottom) + 1rem)}
}
@media(max-width:480px){
  .header{padding:0 1rem;height:58px}
  .content{padding:0.85rem;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  .sgrid{grid-template-columns:1fr 1fr}
  .sval{font-size:1.7rem}
  .rooms-grid{grid-template-columns:1fr}
  .ch-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<!-- Bottom Nav -->
<nav class="bnav" id="bnav" style="display:none">

  {id:'champion',icon:'👑',name:{ckb:'قارەمان',en:'Champion'},desc:'ئاستی ٢٠',xpNeeded:0,check:x=>x.level>=20},
];
function xpForLevel(l){return l*l*50}
function currentLevel(xp){let l=1;while(xpForLevel(l+1)<=xp)l++;return l}
function addXP(amount,reason=''){
  xpData.xp+=amount;
  const newLevel=currentLevel(xpData.xp);
  const leveledUp=newLevel>xpData.level;
  xpData.level=newLevel;
  // check streak
  const today=new Date().toDateString();
  if(xpData.lastWatch!==today){
    const yesterday=new Date(Date.now()-864e5).toDateString();
    xpData.streak=xpData.lastWatch===yesterday?(xpData.streak||0)+1:1;
    xpData.lastWatch=today;
  }
  // check badges
  const earned=checkBadges();
  saveXP();
  if(amount>0)toast(`+${amount} XP ${reason}`,'ok');
  if(leveledUp)toast(`🎉 ${t('levelUp')} ${t('level')} ${newLevel}`,'ok');
  earned.forEach(b=>toast(`🏅 ${b.name[lang]||b.name.ckb}`,'ok'));
  updateSidebarXP();
}
function checkBadges(){
  const newOnes=[];
  BADGES.forEach(b=>{
    if(!xpData.badges.includes(b.id)&&b.check(xpData)){
      xpData.badges.push(b.id);newOnes.push(b);
    }
  });
  return newOnes;
}
function saveXP(){localStorage.setItem('kw_xp',JSON.stringify(xpData))}
function updateSidebarXP(){
  const el=document.getElementById('sb-xp-label');
  if(el)el.textContent=`XP ${xpData.xp} · Lv${xpData.level}`;
}

  const d=document.createElement('div');
  d.className='toast';
  d.innerHTML=`<span style="font-size:16px">${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;

function addNotif(type,text,link=''){
  notifs.unshift({id:Date.now(),type,text,link,read:false,time:new Date()});
  if(notifs.length>50)notifs=notifs.slice(0,50);
  updateNDot();renderNList();
}
function updateNDot(){
  const n=notifs.filter(x=>!x.read).length;
  const d=document.getElementById('notifDot');
  if(d)d.style.display=n>0?'block':'none';
}
function toggleNotif(){
  const p=document.getElementById('notifPanel');
  p?.classList.toggle('open');
  if(p?.classList.contains('open')){notifs.forEach(n=>n.read=true);updateNDot();renderNList()}
}
function renderNList(){
  const l=document.getElementById('notifList');
  if(!l)return;
  if(!notifs.length){l.innerHTML=`<div class="nempty">${t('notifEmpty')}</div>`;return}
  l.innerHTML=notifs.map(n=>`
    <div class="nitem ${n.read?'':'unread'}" onclick="handleNotif('${n.link}')">
      <div class="nico">${n.type==='msg'?'💬':n.type==='room'?'🏠':n.type==='xp'?'⭐':'📺'}</div>
      <div><div class="ntxt">${n.text}</div><div class="ntime">${timeAgo(n.time)}</div></div>
    </div>`).join('');
}
function handleNotif(link){document.getElementById('notifPanel')?.classList.remove('open');if(link)navigate(link)}
function clearNotifs(){notifs.forEach(n=>n.read=true);updateNDot();renderNList()}
function timeAgo(d){
  const diff=Math.floor((Date.now()-new Date(d))/1000);
  if(diff<60)return lang==='en'?'just now':'ئێستا';
  if(diff<3600)return lang==='en'?`${Math.floor(diff/60)}m ago`:`${Math.floor(diff/60)} خولەک پێش`;
  return lang==='en'?`${Math.floor(diff/3600)}h ago`:`${Math.floor(diff/3600)} کاتژمێر پێش`;
}
document.addEventListener('click',e=>{
  const p=document.getElementById('notifPanel');
  if(p?.classList.contains('open')&&!p.contains(e.target)&&!document.getElementById('notifBtn')?.contains(e.target))p.classList.remove('open');
  const d=document.getElementById('userDrop');
  if(d?.classList.contains('open')&&!d.closest('.hwrap')?.contains(e.target))d.classList.remove('open');
  if(!e.target.closest('.hcenter'))document.getElementById('searchDrop')?.classList.remove('open');
});

function isFav(id){return favs.includes(id)}
function isWl(id){return watchlist.includes(id)}
function toggleFav(id,e){
  if(e)e.stopPropagation();
  favs=isFav(id)?favs.filter(f=>f!==id):[...favs,id];
  localStorage.setItem('kw_favs',JSON.stringify(favs));
  if(page==='channels')loadChannels();
}
function toggleWl(id,e){
  if(e)e.stopPropagation();
  if(isWl(id)){watchlist=watchlist.filter(w=>w!==id);toast(t('removedWl'),'ok')}
  else{watchlist=[...watchlist,id];toast(t('addedWl'),'ok')}
  localStorage.setItem('kw_wl',JSON.stringify(watchlist));
}
function addToWLStream(){if(streamCh)toggleWl(streamCh.id)}
function toggleFavModal(){if(streamCh)toggleFav(streamCh.id);updateFavBtn()}
function updateFavBtn(){
  const txt=document.getElementById('favStreamTxt');
  if(txt&&streamCh)txt.textContent=isFav(streamCh.id)?'دڵخوازت کرد':'دڵخواز';
}
function addToHist(ch){
  hist=hist.filter(h=>h.id!==ch.id);
  hist.unshift({id:ch.id,name:ch.name,category:ch.category,time:new Date().toISOString()});
  if(hist.length>20)hist=hist.slice(0,20);
  localStorage.setItem('kw_hist',JSON.stringify(hist));
}

function recommend(channels){
  if(!prefCats.length)return channels;
  return[...channels.filter(c=>prefCats.includes(c.category)),...channels.filter(c=>!prefCats.includes(c.category))];
}

let searchTimer=null;
async function onSearch(v){
  searchQ=v;const drop=document.getElementById('searchDrop');
  clearTimeout(searchTimer);
  if(!v.trim()){drop.classList.remove('open');if(page==='channels')loadChannels();return}
  searchTimer=setTimeout(async()=>{
    const{data}=await sb.from('channels').select('id,name,category').ilike('name',`%${v}%`).limit(6);
    if(!data?.length){drop.classList.remove('open')}
    else{
      drop.innerHTML=data.map(c=>`
        <div class="si" onclick="openStream(${c.id});document.getElementById('searchDrop').classList.remove('open')">
          <div class="si-icon">📺</div>
          <span style="flex:1">${c.name}</span>
          <span style="font-size:0.65rem;color:var(--text3)">${catLabel(c.category)}</span>
        </div>`).join('');
      drop.classList.add('open');
    }
    if(page==='channels')loadChannels();
  },280);
}

async function init(){
  const saved=localStorage.getItem('kw_dark');
  if(saved==='0'){dark=false;document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️'}
  const{data:{session}}=await sb.auth.getSession();
  if(session)await loadUser(session.user.id);
  sb.auth.onAuthStateChange(async(ev,ses)=>{
    if(ses)await loadUser(ses.user.id);
    else{user=null;cache.all();render()}
  });
  render();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
}
async function loadUser(id){
  const{data:p}=await sb.from('profiles').select('*').eq('id',id).single();
  const{data:{user:u}}=await sb.auth.getUser();
  user={...u,profile:p};
}
function isAdmin(){return user?.profile?.role==='owner'||user?.profile?.role==='admin'}
function isOwner(){return user?.profile?.role==='owner'}
function hasPerm(p){
  if(!user?.profile)return false;
  if(isOwner())return true;
  const ps=user.profile.permissions||[];
  return ps.includes('all')||ps.includes(p);
}
function catLabel(c){
  const m={kurdish:t('kurdish'),sport:t('sport'),news:t('news'),entertainment:t('entertainment')};
  return m[c]||c;
}
function avatarUrl(p){
  if(p?.avatar_url)return`<img src="${p.avatar_url}" alt="av" onerror="this.style.display='none'">`;
  return(p?.username||'U')[0].toUpperCase();
}
function avatarContent(p){
  if(p?.avatar_url)return`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none'">${(p?.username||'U')[0].toUpperCase()}`;
  return(p?.username||'U')[0].toUpperCase();
}

// ─────────────────────────────────────────────
let obStep=0;
function showOnboarding(){
  const steps=[
    {icon:'👋',title:t('obWelcome'),sub:t('obWelcomeSub'),type:'welcome'},
    {icon:'🎯',title:t('obCats'),sub:t('obCatsSub'),type:'cats'},
    {icon:'🚀',title:'دووری نیە!',sub:'ئێستا ئامادەیت بچی تەماشا بکەیت',type:'done'},
  ];
  obStep=0;renderObStep(steps);
}
function renderObStep(steps){
  document.getElementById('obOverlay')?.remove();
  const s=steps[obStep];
  const div=document.createElement('div');
  div.className='ob-over';div.id='obOverlay';
  div.innerHTML=`
    <div class="ob-box">
      <div class="ob-steps">${steps.map((_,i)=>`<div class="ob-step ${i<obStep?'done':i===obStep?'active':''}"></div>`).join('')}</div>
      <div class="ob-icon">${s.icon}</div>
      <div class="ob-title">${s.title}</div>
      <div class="ob-sub">${s.sub}</div>
      ${s.type==='cats'?`<div class="ob-cats">${cats.map(c=>`<div class="ob-cat ${prefCats.includes(c)?'sel':''}" onclick="togglePrefCat('${c}',this)">${catLabel(c)}</div>`).join('')}</div>`:''}
      <div class="ob-btn-row">
        ${obStep>0?`<button class="ob-skip" onclick="obBack()">← پاشگەز</button>`:''}
        <button class="ob-next" onclick="${obStep<steps.length-1?'obNext()':'finishOb()'}">${obStep<steps.length-1?'دواتر →':'🚀 '+t('obDone')}</button>
      </div>
    </div>`;
  document.body.appendChild(div);
  // store steps ref
  document._obSteps=steps;
}
function obNext(){obStep++;renderObStep(document._obSteps)}
function obBack(){obStep--;renderObStep(document._obSteps)}
function togglePrefCat(c,el){
  el.classList.toggle('sel');
  prefCats=prefCats.includes(c)?prefCats.filter(x=>x!==c):[...prefCats,c];
  localStorage.setItem('kw_prefcats',JSON.stringify(prefCats));
}
function finishOb(){document.getElementById('obOverlay')?.remove();obDone='1';localStorage.setItem('kw_ob','1')}

    </div>
    <button class="btn-pri" onclick="doReg()"><i class="fas fa-user-plus"></i> ${t('register')}</button>`;

function checkPR(p){
  const c=document.getElementById('prules');if(!c)return;
  c.innerHTML=PRULES.map(r=>`<div class="prule" style="color:${r.fn(p)?'var(--green)':'var(--text3)'}"><i class="fas ${r.fn(p)?'fa-check-circle':'fa-circle'}" style="font-size:10px"></i> ${r.lbl[lang]||r.lbl.ckb}</div>`).join('');
}
async function doLogin(){
  const e=document.getElementById('liEmail').value.trim(),p=document.getElementById('liPass').value;
  const al=document.getElementById('liAlert');
  const at=loginAttempts[e]||{count:0,until:null};
  if(at.until&&Date.now()<at.until){al.className='alert alert-err show';al.textContent=`${Math.ceil((at.until-Date.now())/60000)} ${t('waitMinutes')}`;return}
  const btn=document.querySelector('.auth-pg .btn-pri');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>'}
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(btn){btn.disabled=false;btn.innerHTML=`<i class="fas fa-sign-in-alt"></i> ${t('login')}`}
  if(error){
    at.count=(at.count||0)+1;
    if(at.count>=5){at.until=Date.now()+15*60*1000;at.count=0;al.textContent=t('blocked')}
    else al.textContent=`${t('loginError')} (${5-at.count} ${t('attempts')})`;
    al.className='alert alert-err show';loginAttempts[e]=at;
  }
}
async function doReg(){
  const u=document.getElementById('reName').value.trim(),e=document.getElementById('reEmail').value.trim(),p=document.getElementById('rePass').value;
  const al=document.getElementById('reAlert');
  if(!u||!e||!p){al.className='alert alert-err show';al.textContent=t('fillAll');return}
  if(!validPass(p)){al.className='alert alert-err show';al.textContent=t('passRules');return}
  const btn=document.querySelector('.auth-pg .btn-pri');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>'}
  const{data,error}=await sb.auth.signUp({email:e,password:p,options:{data:{username:u}}});
  if(btn){btn.disabled=false;btn.innerHTML=`<i class="fas fa-user-plus"></i> ${t('register')}`}
  if(error){al.className='alert alert-err show';al.textContent=error.message;return}
  if(data?.user){
    const{count}=await sb.from('profiles').select('*',{count:'exact',head:true});
    await sb.from('profiles').upsert({id:data.user.id,username:u,email:e,role:count===0?'owner':'user',permissions:count===0?['all']:[]});
    al.className='alert alert-ok show';al.textContent='✅ '+t('regSuccess');
    setTimeout(()=>showLogin(),2200);
  }
}

// ── AVATAR ──
function openAvatarModal(){avBlob=null;document.getElementById('avPreview').style.display='none';document.getElementById('avFileInp').value='';document.getElementById('avErr').className='alert alert-err';document.getElementById('avatarModal').classList.add('open')}
function closeAvatarModal(){document.getElementById('avatarModal').classList.remove('open')}
function previewAvatar(inp){
  const file=inp.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){document.getElementById('avErr').className='alert alert-err show';document.getElementById('avErr').textContent='تەنها وێنە قبوڵ دەکرێت';return}
  if(file.size>2*1024*1024){document.getElementById('avErr').className='alert alert-err show';document.getElementById('avErr').textContent='وێنەکە زیاتر لە 2MB نەبێت';return}
  avBlob=file;
  const reader=new FileReader();
  reader.onload=e=>{document.getElementById('avPreviewImg').src=e.target.result;document.getElementById('avPreview').style.display='block'}
  reader.readAsDataURL(file);
}
async function uploadAvatar(){
  if(!avBlob){document.getElementById('avErr').className='alert alert-err show';document.getElementById('avErr').textContent='تکایە وێنەیەک هەڵبژێرە';return}
  const ext=avBlob.name.split('.').pop();
  const path=`avatars/${user.id}_${Date.now()}.${ext}`;
  const{error:upErr}=await sb.storage.from('avatars').upload(path,avBlob,{upsert:true});
  if(upErr){
    // If no storage bucket, use base64 approach
    const reader=new FileReader();
    reader.onload=async e=>{
      const b64=e.target.result;
      await sb.from('profiles').update({avatar_url:b64}).eq('id',user.id);
      toast(t('updated'));closeAvatarModal();await loadUser(user.id);render();
    };
    reader.readAsDataURL(avBlob);return;
  }
  const{data:{publicUrl}}=sb.storage.from('avatars').getPublicUrl(path);
  await sb.from('profiles').update({avatar_url:publicUrl}).eq('id',user.id);
  toast(t('updated'));closeAvatarModal();await loadUser(user.id);render();
}

function openPassModal(){document.getElementById('oldPassInp').value='';document.getElementById('newPassInp').value='';document.getElementById('confPassInp').value='';document.getElementById('passErr').className='alert alert-err';document.getElementById('passStrBar').style.width='0';document.getElementById('newPassRules').innerHTML='';document.getElementById('passModal').classList.add('open')}
function closePassModal(){document.getElementById('passModal').classList.remove('open')}
function checkNewPass(p){
  const score=passScore(p);
  const pct=score/5*100;
  const colors=['var(--red)','var(--red)','var(--yellow)','var(--yellow)','var(--green)'];
  const bar=document.getElementById('passStrBar');
  if(bar){bar.style.width=pct+'%';bar.style.background=colors[score-1]||'var(--border2)'}
  const c=document.getElementById('newPassRules');
  if(c)c.innerHTML=PRULES.map(r=>`<div class="prule" style="color:${r.fn(p)?'var(--green)':'var(--text3)'}"><i class="fas ${r.fn(p)?'fa-check-circle':'fa-circle'}" style="font-size:10px"></i> ${r.lbl[lang]||r.lbl.ckb}</div>`).join('');
}
async function changePassword(){
  const oldP=document.getElementById('oldPassInp').value;
  const newP=document.getElementById('newPassInp').value;
  const confP=document.getElementById('confPassInp').value;
  const errEl=document.getElementById('passErr');
  if(!oldP||!newP||!confP){errEl.className='alert alert-err show';errEl.textContent=t('fillAll');return}
  if(newP!==confP){errEl.className='alert alert-err show';errEl.textContent=t('passNoMatch');return}
  if(!validPass(newP)){errEl.className='alert alert-err show';errEl.textContent=t('passWeak');return}
  // Re-authenticate first
  const{error:reErr}=await sb.auth.signInWithPassword({email:user.email,password:oldP});
  if(reErr){errEl.className='alert alert-err show';errEl.textContent=t('passErr');return}
  const{error}=await sb.auth.updateUser({password:newP});
  if(error){errEl.className='alert alert-err show';errEl.textContent=error.message;return}
  toast(t('passChanged'));closePassModal();
}

async function loadChannels(){
  const k=`chs_${filterCat}_${searchQ}`;
  let data=cache.get(k);
  if(!data){
    if(filterCat==='favs'){
      if(!favs.length){data=[]}
      else{let q=sb.from('channels').select('*').in('id',favs).order('name');if(searchQ)q=q.ilike('name',`%${searchQ}%`);const r=await q;data=r.data||[]}
    }else{
      let q=sb.from('channels').select('*');
      if(filterCat!=='all')q=q.eq('category',filterCat);
      if(searchQ)q=q.ilike('name',`%${searchQ}%`);
      q=q.order('name');const r=await q;data=r.data||[];
    }
    cache.set(k,data,45000);
  }
  data=recommend(data);
  const c=document.getElementById('chList');const cnt=document.getElementById('chCount');
  if(!c)return;
  if(cnt)cnt.textContent=`${data.length} کەناڵ`;
  if(!data.length){c.innerHTML=`<div class="empty"><i class="fas fa-tv"></i><h3>${filterCat==='favs'?t('noFavs'):t('noChannels')}</h3></div>`;return}
  c.innerHTML=`<div class="ch-grid">${data.map(ch=>chCard(ch)).join('')}</div>`;
}

function setFilter(c){filterCat=c;document.querySelectorAll('.fchip').forEach((el,i)=>{const all=['all',...cats,'favs'];el.classList.toggle('active',all[i]===c)});loadChannels()}

async function openStream(id){
  const cached=cache.get(`ch_${id}`);
  const ch=cached||(await sb.from('channels').select('*').eq('id',id).single()).data;
  if(!ch)return;
  cache.set(`ch_${id}`,ch,120000);
  streamCh=ch;addToHist(ch);
  sb.from('channels').update({views:(ch.views||0)+1}).eq('id',id).then(()=>{});
  addXP(10,'📺');  // XP for watching
  document.getElementById('streamTitle').textContent=ch.name;
  document.getElementById('streamMeta').textContent=catLabel(ch.category)+' · '+Math.floor(Math.random()*900+100)+' '+t('viewers');
  updateFavBtn();
  buildVideo(ch.live_url,'videoWrap','streamHls');
  document.getElementById('streamModal').classList.add('open');
  document.body.style.overflow='hidden';
  pipChId=id;
}
function closeStream(){
  document.getElementById('streamModal').classList.remove('open');
  document.body.style.overflow='';
  destroyHls('streamHls');
  document.getElementById('videoWrap').innerHTML='';
  streamCh=null;
}

// ── PiP ──
function openPip(){
  if(!streamCh)return;
  const wrap=document.getElementById('pipWrap');
  const content=document.getElementById('pipContent');
  document.getElementById('pipTitle').textContent=streamCh.name;
  if(streamCh.live_url?.includes('.m3u8')){
    content.innerHTML='<video id="pipVideo" controls autoplay playsinline style="width:280px;height:158px;display:block"></video>';
    const v=document.getElementById('pipVideo');
    destroyHls('pipHls');
    if(Hls.isSupported()){hlsPool.pipHls=new Hls({lowLatencyMode:true});hlsPool.pipHls.loadSource(streamCh.live_url);hlsPool.pipHls.attachMedia(v)}
    else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=streamCh.live_url}
  }else if(streamCh.live_url){
    content.innerHTML=`<iframe src="${streamCh.live_url}" frameborder="0" allowfullscreen allow="autoplay" style="width:280px;height:158px;display:block"></iframe>`;
  }
  wrap.classList.add('show');closeStream();
  // Draggable PiP
  makeDraggable(wrap);
}
function closePip(){
  document.getElementById('pipWrap').classList.remove('show');
  destroyHls('pipHls');
  document.getElementById('pipContent').innerHTML='';
}
function makeDraggable(el){
  let ox=0,oy=0,mx=0,my=0;
  el.onmousedown=e=>{e.preventDefault();mx=e.clientX;my=e.clientY;document.onmousemove=drag;document.onmouseup=()=>{document.onmousemove=null;document.onmouseup=null;el.style.cursor='grab'}};
  function drag(e){ox=mx-e.clientX;oy=my-e.clientY;mx=e.clientX;my=e.clientY;el.style.top=(el.offsetTop-oy)+'px';el.style.left=(el.offsetLeft-ox)+'px';el.style.bottom='auto';el.style.cursor='grabbing'};
}

// ── VIDEO BUILDER ──
function destroyHls(key){if(hlsPool[key]){try{hlsPool[key].destroy()}catch(e){}delete hlsPool[key]}}
function buildVideo(url,wrId,hlsKey){
  const w=document.getElementById(wrId);if(!w)return;
  if(!url){w.innerHTML=`<div class="vempty"><i class="fas fa-tv"></i><span>${t('noChannel')}</span></div>`;return}
  if(url.includes('.m3u8')||url.includes('hls')){
    w.innerHTML=`<video id="${wrId}Vid" controls autoplay playsinline style="width:100%;height:100%"></video>`;
    const v=document.getElementById(`${wrId}Vid`);
    destroyHls(hlsKey);
    if(Hls.isSupported()){hlsPool[hlsKey]=new Hls({lowLatencyMode:true});hlsPool[hlsKey].loadSource(url);hlsPool[hlsKey].attachMedia(v)}
    else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=url}
  }else{
    w.innerHTML=`<iframe src="${url}" frameborder="0" allowfullscreen allow="autoplay" style="width:100%;height:100%"></iframe>`;
  }
}

async function renderRooms(){
  document.getElementById('pageContent').innerHTML=`
    <div class="ph">
      <div class="ph-left"><div class="ph-icon">🏠</div><div><div class="ph-title">${t('rooms')}</div><div class="ph-sub" id="rmCount">...</div></div></div>
      <button class="btn-create" onclick="openCreateRoom()"><i class="fas fa-plus"></i> ${t('newRoom')}</button>
    </div>
    <div id="roomsList"><div class="loading"><div class="spinner"></div></div></div>`;
  await loadRooms();subscribeRooms();
}

async function loadRooms(){
  const{data}=await sb.from('rooms').select('*').order('created_at',{ascending:false});
  const c=document.getElementById('roomsList');const cnt=document.getElementById('rmCount');
  if(!c)return;
  if(cnt)cnt.textContent=`${(data||[]).length} ژوور`;
  if(!data?.length){c.innerHTML=`<div class="empty"><i class="fas fa-door-closed"></i><h3>${t('noRooms')}</h3></div>`;return}
  const rows=await Promise.all(data.map(async r=>{
    const priv=r.is_private===true,own=r.owner_id===user?.id;
    let mems=[];
    if(own){const{data:m}=await sb.from('room_members').select('*,profiles(username)').eq('room_id',r.id);mems=m||[]}
    const mc=mems.length||r.member_count||0;
    return`<div class="room-card ${priv?'private':'public'}" onclick="joinRoom(${r.id},${priv},'${r.owner_id}')">
      <div class="room-name">${r.name}<span class="rbadge ${priv?'private':'public'}"><i class="fas fa-${priv?'lock':'globe'}"></i> ${priv?t('private'):t('public')}</span></div>
      <div class="room-desc">${r.description||r.channel_name||''}</div>
      <div class="room-foot">
        <span class="room-members"><i class="fas fa-users"></i> ${mc} ${t('members')}</span>
        ${own?`<span class="room-owner"><i class="fas fa-crown"></i> ${t('owner')}</span>`:''}
      </div>
      ${own&&mems.length?`<div class="rml"><div class="rml-t">ئەندامەکان</div><div class="rml-tags">${mems.map(m=>`<span class="rml-tag">${m.profiles?.username||'?'}</span>`).join('')}</div></div>`:''}
    </div>`;
  }));
  c.innerHTML=`<div class="rooms-grid">${rows.join('')}</div>`;
}

function subscribeRooms(){
  if(roomListSub){try{sb.removeChannel(roomListSub)}catch(e){}}
  roomListSub=sb.channel('rl_'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'rooms'},async payload=>{
      if(payload.new.owner_id!==user?.id)addNotif('room',`🏠 ${payload.new.name}`,'rooms');
      if(page==='rooms')loadRooms();
    }).subscribe();
}

async function openCreateRoom(){

  const s=document.getElementById('roomChSel');
  if(s)s.innerHTML=`<option value="">بێ کەناڵ</option>`+(data||[]).map(c=>`<option value="${c.id}" data-name="${c.name}">${c.name}</option>`).join('');

}
function closeCreateRoom(){document.getElementById('createRoomModal').classList.remove('open')}
function selRoomType(ty){
  roomType=ty;document.querySelectorAll('.ropt').forEach(el=>el.classList.remove('sel'));
  document.querySelector(`.ropt.${ty}`)?.classList.add('sel');
  document.getElementById('roomPassGroup').style.display=ty==='private'?'block':'none';
}
async function createRoom(){
  const n=document.getElementById('roomNameInp').value.trim();
  const s=document.getElementById('roomChSel');const cId=s.value||null;
  const cName=cId?(s.options[s.selectedIndex]?.dataset?.name||''):'';
  const p=document.getElementById('roomPassInp').value;
  if(!n){toast(t('fillAll'),'err');return}
  if(roomType==='private'&&!p){toast(t('passRequired'),'err');return}
  const d={name:n,owner_id:user.id,channel_id:cId,channel_name:cName,is_private:roomType==='private',member_count:1};
  if(roomType==='private')d.password_hash=btoa(p);  // NOTE: use edge function for production
  const{error}=await sb.from('rooms').insert(d);
  if(error){toast(error.message,'err');return}
  closeCreateRoom();toast(t('roomCreated'));
  addXP(20,'🏠');
  renderRooms();
}

async function joinRoom(id,priv,ownerId){
  if(priv===true&&ownerId!==user?.id){
    pendingJoinId=id;
    document.getElementById('joinPassInp').value='';
    const e=document.getElementById('joinErr');
    if(e){e.style.display='none';e.textContent=''}
    document.getElementById('joinRoomModal').classList.add('open');
  }else{
    const{data:ex}=await sb.from('room_members').select('*').eq('room_id',id).eq('user_id',user.id);
    if(!ex||ex.length===0){
      await sb.from('room_members').insert({room_id:id,user_id:user.id});
      const{data:rm}=await sb.from('rooms').select('member_count').eq('id',id).single();
      if(rm)await sb.from('rooms').update({member_count:(rm.member_count||0)+1}).eq('id',id);
    }
    openRoom(id);
  }
}
function closeJoin(){document.getElementById('joinRoomModal').classList.remove('open');pendingJoinId=null}
async function submitJoin(){
  const p=document.getElementById('joinPassInp').value;
  const e=document.getElementById('joinErr');
  const{data:rm}=await sb.from('rooms').select('password_hash').eq('id',pendingJoinId).single();
  if(!rm||rm.password_hash!==btoa(p)){e.textContent=t('passErr');e.className='alert alert-err show';return}
  closeJoin();
  const{data:ex}=await sb.from('room_members').select('*').eq('room_id',pendingJoinId).eq('user_id',user.id);
  if(!ex||ex.length===0)await sb.from('room_members').upsert({room_id:pendingJoinId,user_id:user.id});
  openRoom(pendingJoinId);
}

// ── ROOM MODAL ──
async function openRoom(id){
  roomId=id;
  const{data:rm}=await sb.from('rooms').select('*').eq('id',id).single();
  if(!rm)return;
  document.getElementById('roomModalTitle').textContent=rm.name+(rm.is_private?' 🔒':' 🌐');
  await loadRoomMembers(id);
  await setupRoomVideo(rm);
  if(rm.owner_id===user?.id){
    const{data:chs}=await sb.from('channels').select('id,name');
    if(chs?.length){
      const sw=document.getElementById('rChSel');
      sw.innerHTML=`<option value="">بێ کەناڵ</option>`+chs.map(c=>`<option value="${c.id}" ${c.id===rm.channel_id?'selected':''} data-url="${c.live_url||''}">${c.name}</option>`).join('');
      document.getElementById('rChBar').style.display='flex';
    }
  }
  document.getElementById('roomModal').classList.add('open');
  document.body.style.overflow='hidden';
  await loadRoomChat(id);
  logAct('join',`${user.profile?.username} joined: ${rm.name}`);
  addXP(5,'🏠');
}
async function setupRoomVideo(rm){
  if(rm.channel_id){
    const{data:ch}=await sb.from('channels').select('*').eq('id',rm.channel_id).single();
    if(ch?.live_url)buildVideo(ch.live_url,'roomVideoWrap','roomHls');
    else document.getElementById('roomVideoWrap').innerHTML=`<div class="vempty"><i class="fas fa-tv"></i><span>${t('noChannel')}</span></div>`;
  }
}
async function changeRoomCh(){
  const s=document.getElementById('rChSel');const sid=s.value||null;
  const sname=sid?(s.options[s.selectedIndex]?.textContent||''):'';
  if(!roomId)return;
  await sb.from('rooms').update({channel_id:sid,channel_name:sname}).eq('id',roomId);
  toast(t('channelSwitched'));
  if(sid){const{data:ch}=await sb.from('channels').select('live_url').eq('id',sid).single();buildVideo(ch?.live_url||'','roomVideoWrap','roomHls')}
  else document.getElementById('roomVideoWrap').innerHTML=`<div class="vempty"><i class="fas fa-tv"></i><span>${t('noChannel')}</span></div>`;
}
async function loadRoomMembers(rId){
  const{data}=await sb.from('room_members').select('*,profiles(username,id)').eq('room_id',rId);
  roomMembers=data||[];
  document.getElementById('roomMemberCount').textContent=`${roomMembers.length} ${t('members')}`;
  document.getElementById('memberBarCount').textContent=`${roomMembers.length} ${t('members')}`;
  const av=document.getElementById('memberAvatars');
  if(av)av.innerHTML=roomMembers.slice(0,5).map(m=>`<div class="mav" title="${m.profiles?.username||'?'}">${(m.profiles?.username||'?')[0].toUpperCase()}</div>`).join('');
}
async function leaveRoom(){
  if(!roomId)return;if(!confirm(t('confirmLeave')))return;
  const id=roomId;logAct('leave',`${user.profile?.username} left ${id}`);closeRoomModal();
  await sb.from('room_members').delete().eq('room_id',id).eq('user_id',user.id);
  const{data:rm}=await sb.from('rooms').select('member_count,owner_id').eq('id',id).single();
  if(rm){
    const nc=Math.max(0,(rm.member_count||1)-1);
    await sb.from('rooms').update({member_count:nc}).eq('id',id);
    if(rm.owner_id===user.id&&nc===0){await sb.from('rooms').delete().eq('id',id);toast(t('roomDeleted'))}
    else toast(t('leftRoom'));
  }
  if(page==='rooms')renderRooms();
}

}
